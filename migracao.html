<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Migração Supabase — SCONT</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; padding: 32px; min-height: 100vh; }
    h1 { font-size: 22px; color: #f8fafc; margin-bottom: 4px; }
    .sub { font-size: 13px; color: #94a3b8; margin-bottom: 32px; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
    .card h2 { font-size: 14px; font-weight: 700; color: #cbd5e1; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .tag { background: #0f172a; border: 1px solid #334155; border-radius: 6px; padding: 4px 10px; font-size: 12px; color: #7dd3fc; }
    .btn { padding: 11px 24px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-start { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; }
    .btn-start:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(99,102,241,0.4); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
    .log-box { background: #0f172a; border: 1px solid #1e293b; border-radius: 8px; padding: 16px; height: 400px; overflow-y: auto; font-family: monospace; font-size: 12px; line-height: 1.7; }
    .log-info  { color: #94a3b8; }
    .log-ok    { color: #4ade80; }
    .log-warn  { color: #fbbf24; }
    .log-err   { color: #f87171; }
    .log-title { color: #818cf8; font-weight: bold; }
    .log-dim   { color: #475569; }
    .progress-wrap { margin: 10px 0; }
    .progress-label { font-size: 12px; color: #94a3b8; margin-bottom: 4px; display: flex; justify-content: space-between; }
    .progress-bar  { height: 5px; background: #0f172a; border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #6366f1, #8b5cf6); border-radius: 3px; transition: width 0.3s ease; }
    .badge-ok  { color: #4ade80; }
    .badge-err { color: #f87171; }
    .info-row { font-size: 12px; color: #64748b; margin-bottom: 10px; }
    .info-row span { color: #94a3b8; }
    .col-diff { background: #0f172a; border-radius: 8px; padding: 12px 16px; margin-top: 12px; font-size: 12px; font-family: monospace; line-height: 1.8; }
    .col-ok   { color: #4ade80; }
    .col-skip { color: #64748b; }
    .col-head { color: #818cf8; font-weight: bold; margin-top: 8px; }
  </style>
</head>
<body>

<h1>🔄 Migração Supabase</h1>
<p class="sub">Origem → Destino • somente campos existentes no destino são migrados</p>

<div class="card">
  <h2>Configuração</h2>
  <div class="info-row">Origem: <span>graxaoomeffhsazuzkvg</span> &nbsp;→&nbsp; Destino: <span>dsdqwigopzrdmxtmhsez</span></div>
  <div class="info-row">Tabelas:</div>
  <div class="tags" id="tablesTags"></div>
  <div class="info-row" style="margin-top:12px">Bucket: <span>documentos</span></div>
</div>

<div class="card">
  <h2>Progresso</h2>
  <div id="progressSection"><p style="color:#475569;font-size:13px">Aguardando início…</p></div>
  <div id="colDiffSection"></div>
</div>

<div class="card">
  <h2>Log</h2>
  <div class="log-box" id="logBox"></div>
</div>

<div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
  <button class="btn btn-start" id="btnStart" onclick="startMigration()">▶ Iniciar Migração</button>
  <span id="statusBadge" style="font-size:13px;color:#64748b"></span>
</div>

<script>
// ── Credenciais ──────────────────────────────────────────────────────────────
const SRC_URL = 'https://graxaoomeffhsazuzkvg.supabase.co';
const SRC_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdyYXhhb29tZWZmaHNhenV6a3ZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MTUxMDUsImV4cCI6MjA5MDI5MTEwNX0.ZpbVoNVS4momTyf7NME4mcYuI4oCQUvNFSDbORCHktI';

const DST_URL = 'https://dsdqwigopzrdmxtmhsez.supabase.co';
const DST_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRzZHF3aWdvcHpyZG14dG1oc2V6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2ODM2OTUsImV4cCI6MjA5MjI1OTY5NX0.MPxbcKh6N_BNh0zTTb-jtNigQwCp-e6g3xboBbNbRmw';

const TABLES    = ['formularios', 'empregados', 'documentos', 'dependentes'];
const BUCKET    = 'documentos';
const PAGE_SIZE = 500;

document.getElementById('tablesTags').innerHTML = TABLES.map(t => `<span class="tag">${t}</span>`).join('');

// ── Log ───────────────────────────────────────────────────────────────────────
const logBox = document.getElementById('logBox');
function log(msg, type = 'info') {
  const line = document.createElement('div');
  line.className = 'log-' + type;
  line.textContent = '[' + new Date().toLocaleTimeString('pt-BR') + '] ' + msg;
  logBox.appendChild(line);
  logBox.scrollTop = logBox.scrollHeight;
}
function logSep(label) {
  const d = document.createElement('div');
  d.className = 'log-title';
  d.textContent = '──── ' + label + ' ────';
  logBox.appendChild(d);
}

// ── Colunas do destino via OpenAPI ────────────────────────────────────────────
async function getDstColumns(table) {
  try {
    const res = await fetch(`${DST_URL}/rest/v1/?apikey=${DST_KEY}`, { headers: { apikey: DST_KEY } });
    if (!res.ok) return null;
    const spec = await res.json();
    const props = spec.definitions?.[table]?.properties;
    return props ? Object.keys(props) : null;
  } catch { return null; }
}

// Cache para não buscar múltiplas vezes
let _dstSchema = null;
async function getDstSchema() {
  if (_dstSchema) return _dstSchema;
  try {
    const res = await fetch(`${DST_URL}/rest/v1/?apikey=${DST_KEY}`, { headers: { apikey: DST_KEY } });
    if (!res.ok) { _dstSchema = {}; return {}; }
    const spec = await res.json();
    _dstSchema = {};
    for (const [t, def] of Object.entries(spec.definitions || {})) {
      _dstSchema[t] = Object.keys(def.properties || {});
    }
  } catch { _dstSchema = {}; }
  return _dstSchema;
}

// ── Filtrar linha da origem para ter só colunas do destino ────────────────────
function filterRow(row, dstCols) {
  const dstSet = new Set(dstCols.map(c => c.toLowerCase()));
  const out = {};
  for (const [k, v] of Object.entries(row)) {
    if (dstSet.has(k.toLowerCase())) out[k] = v;
  }
  return out;
}

// ── Progresso ─────────────────────────────────────────────────────────────────
const stats = { tabelas: {}, bucket: { total: 0, ok: 0, err: 0 } };

function buildProgressHTML() {
  let html = '';
  for (const t of TABLES) {
    const s = stats.tabelas[t] || { fetched: 0, inserted: 0, errors: 0, done: false };
    const pct = s.fetched > 0 ? Math.round((s.inserted + s.errors) / s.fetched * 100) : 0;
    const badge = s.done ? (s.errors === 0 ? ' <span class="badge-ok">✓</span>' : ' <span class="badge-err">!</span>') : '';
    html += `<div class="progress-wrap">
      <div class="progress-label">
        <span>${t}${badge}</span>
        <span>${s.inserted} inseridos${s.errors > 0 ? ' / <span class="badge-err">' + s.errors + ' erros</span>' : ''} / ${s.fetched} lidos</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>`;
  }
  const bpct = stats.bucket.total > 0 ? Math.round((stats.bucket.ok + stats.bucket.err) / stats.bucket.total * 100) : 0;
  html += `<div class="progress-wrap">
    <div class="progress-label">
      <span>bucket: ${BUCKET}</span>
      <span>${stats.bucket.ok} copiados${stats.bucket.err > 0 ? ' / <span class="badge-err">' + stats.bucket.err + ' erros</span>' : ''} / ${stats.bucket.total} arquivos</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${bpct}%"></div></div>
  </div>`;
  return html;
}

function refreshProgress() { document.getElementById('progressSection').innerHTML = buildProgressHTML(); }

// ── Migração ──────────────────────────────────────────────────────────────────
async function startMigration() {
  const btn = document.getElementById('btnStart');
  btn.disabled = true;
  document.getElementById('statusBadge').textContent = '⏳ Rodando…';
  logBox.innerHTML = '';
  document.getElementById('colDiffSection').innerHTML = '';
  Object.keys(stats.tabelas).forEach(k => delete stats.tabelas[k]);
  stats.bucket = { total: 0, ok: 0, err: 0 };

  const src = window.supabase.createClient(SRC_URL, SRC_KEY);
  const dst = window.supabase.createClient(DST_URL, DST_KEY);

  log('Carregando schema do destino…', 'info');
  const dstSchema = await getDstSchema();

  const colDiffLines = [];

  // ── Tabelas
  for (const table of TABLES) {
    logSep('Tabela: ' + table);
    stats.tabelas[table] = { fetched: 0, inserted: 0, errors: 0, done: false };
    refreshProgress();

    // Colunas disponíveis no destino
    const dstCols = dstSchema[table] || [];
    if (dstCols.length === 0) {
      log(`Schema do destino não encontrado para "${table}" — tentando inserir como está.`, 'warn');
    }

    // Leitura paginada da origem
    let allRows = [], from = 0;
    while (true) {
      const { data, error } = await src.from(table).select('*').range(from, from + PAGE_SIZE - 1);
      if (error) { log(`Erro ao ler ${table}: ${error.message}`, 'err'); break; }
      if (!data || data.length === 0) break;
      allRows = allRows.concat(data);
      log(`  Lidos ${allRows.length} registros…`, 'dim');
      if (data.length < PAGE_SIZE) break;
      from += PAGE_SIZE;
    }

    stats.tabelas[table].fetched = allRows.length;
    log(`Total lido: ${allRows.length}`, 'info');
    refreshProgress();

    if (allRows.length === 0) {
      log(`${table}: vazia ou sem acesso.`, 'warn');
      stats.tabelas[table].done = true;
      refreshProgress();
      continue;
    }

    // Mostrar diff de colunas
    if (dstCols.length > 0 && allRows.length > 0) {
      const srcCols  = Object.keys(allRows[0]);
      const dstSet   = new Set(dstCols.map(c => c.toLowerCase()));
      const usadas   = srcCols.filter(c => dstSet.has(c.toLowerCase()));
      const ignoradas = srcCols.filter(c => !dstSet.has(c.toLowerCase()));
      colDiffLines.push(`<div class="col-head">${table}</div>`);
      colDiffLines.push(...usadas.map(c   => `<span class="col-ok">  ✓ ${c}</span>`));
      colDiffLines.push(...ignoradas.map(c => `<span class="col-skip">  — ${c} (ignorado)</span>`));
      log(`  Colunas migradas: ${usadas.join(', ')}`, 'info');
      if (ignoradas.length) log(`  Ignoradas (não existem no destino): ${ignoradas.join(', ')}`, 'warn');
    }

    // Filtrar e fazer upsert
    const filteredRows = dstCols.length > 0 ? allRows.map(r => filterRow(r, dstCols)) : allRows;

    const BATCH = 200;
    for (let i = 0; i < filteredRows.length; i += BATCH) {
      const batch = filteredRows.slice(i, i + BATCH);
      const { error: upsErr } = await dst.from(table).upsert(batch, { onConflict: 'id', ignoreDuplicates: false });
      if (upsErr) {
        log(`  Erro no upsert (lote ${Math.floor(i/BATCH)+1}): ${upsErr.message}`, 'err');
        stats.tabelas[table].errors += batch.length;
      } else {
        stats.tabelas[table].inserted += batch.length;
        log(`  ✓ Lote ${Math.floor(i/BATCH)+1} — ${stats.tabelas[table].inserted}/${filteredRows.length}`, 'ok');
      }
      refreshProgress();
    }

    stats.tabelas[table].done = true;
    refreshProgress();
    log(`${table}: ${stats.tabelas[table].inserted} ok, ${stats.tabelas[table].errors} erros.`,
        stats.tabelas[table].errors > 0 ? 'warn' : 'ok');
  }

  // Exibir diff de colunas
  if (colDiffLines.length) {
    document.getElementById('colDiffSection').innerHTML =
      `<div class="col-diff" style="margin-top:16px">${colDiffLines.join('<br>')}</div>`;
  }

  // ── Bucket
  logSep('Bucket: ' + BUCKET);

  async function listarArquivos(sb, prefix) {
    const { data, error } = await sb.storage.from(BUCKET).list(prefix || '', { limit: 1000 });
    if (error) { log('Erro ao listar: ' + error.message, 'err'); return []; }
    let arquivos = [];
    for (const item of (data || [])) {
      if (item.id === null) {
        const sub = await listarArquivos(sb, (prefix ? prefix + '/' : '') + item.name);
        arquivos = arquivos.concat(sub);
      } else {
        arquivos.push((prefix ? prefix + '/' : '') + item.name);
      }
    }
    return arquivos;
  }

  log('Listando arquivos…', 'info');
  const arquivos = await listarArquivos(src, '');
  stats.bucket.total = arquivos.length;
  log(`Total: ${arquivos.length} arquivos`, 'info');
  refreshProgress();

  for (const path of arquivos) {
    const { data: blob, error: dlErr } = await src.storage.from(BUCKET).download(path);
    if (dlErr) { log(`  ✗ Download: ${path} — ${dlErr.message}`, 'err'); stats.bucket.err++; refreshProgress(); continue; }
    const { error: upErr } = await dst.storage.from(BUCKET).upload(path, blob, { upsert: true });
    if (upErr) { log(`  ✗ Upload: ${path} — ${upErr.message}`, 'err'); stats.bucket.err++; }
    else        { log(`  ✓ ${path}`, 'ok'); stats.bucket.ok++; }
    refreshProgress();
  }

  // ── Resumo
  logSep('Resumo Final');
  let totalOk = 0, totalErr = 0;
  for (const t of TABLES) {
    const s = stats.tabelas[t];
    totalOk  += s.inserted;
    totalErr += s.errors;
    log(`${t}: ${s.inserted} ok / ${s.errors} erros`, s.errors > 0 ? 'warn' : 'ok');
  }
  log(`Bucket: ${stats.bucket.ok} ok / ${stats.bucket.err} erros`, stats.bucket.err > 0 ? 'warn' : 'ok');

  const tudoOk = totalErr === 0 && stats.bucket.err === 0;
  document.getElementById('statusBadge').textContent = tudoOk ? '✅ Concluído sem erros' : '⚠️ Concluído com erros — veja o log';
  document.getElementById('statusBadge').style.color  = tudoOk ? '#4ade80' : '#fbbf24';
  btn.disabled = false;
  btn.textContent = '🔁 Executar Novamente';
}
</script>
</body>
</html>
