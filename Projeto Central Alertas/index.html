<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#111827" media="(prefers-color-scheme: dark)" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Central de Alertas — SCONT</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="../supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../portal-auth-guard.js"></script>
</head>
<body>

  <!-- Auth overlay -->
  <div id="authOverlay" class="auth-overlay">
    <div class="auth-spinner"></div>
    <p class="auth-msg">Verificando acesso…</p>
  </div>

  <!-- App -->
  <div id="app" style="display:none">

    <!-- ── Header ── -->
    <header class="app-header">
      <span class="header-brand">🔔</span>
      <h1 class="header-title">Central de Alertas</h1>
      <div class="header-actions">
        <button class="btn-icon" id="btnTheme"   onclick="toggleTheme()"                           title="Alternar tema">🌙</button>
        <button class="btn-icon" id="btnRefresh" onclick="refreshAlerts()"                          title="Atualizar">🔄</button>
        <button class="btn-icon"                 onclick="navigate('../portal.html')"               title="Portal">🏠</button>
      </div>
    </header>

    <!-- ── Stats chips ── -->
    <div class="stats-bar">
      <button class="stat-chip active" data-sev="total"   onclick="setFilter('todos')">
        <span class="chip-count" id="statTotal">—</span>
        <span class="chip-label">Total</span>
      </button>
      <button class="stat-chip" data-sev="critico" onclick="setFilter('critico')">
        <span class="chip-count" id="statCritico">—</span>
        <span class="chip-label">Crítico</span>
      </button>
      <button class="stat-chip" data-sev="urgente" onclick="setFilter('urgente')">
        <span class="chip-count" id="statUrgente">—</span>
        <span class="chip-label">Urgente</span>
      </button>
      <button class="stat-chip" data-sev="atencao" onclick="setFilter('atencao')">
        <span class="chip-count" id="statAtencao">—</span>
        <span class="chip-label">Atenção</span>
      </button>
      <button class="stat-chip" data-sev="info" onclick="setFilter('info')">
        <span class="chip-count" id="statInfo">—</span>
        <span class="chip-label">Info</span>
      </button>
    </div>

    <!-- ── Category tabs ── -->
    <nav class="cat-tabs" role="tablist">
      <button class="cat-tab active" data-filter="todos"        role="tab" onclick="setFilter('todos')">
        Todos <span class="tab-count" id="tabTodos">0</span>
      </button>
      <button class="cat-tab" data-filter="certificados"        role="tab" onclick="setFilter('certificados')">
        🔐 Certif. <span class="tab-count" id="tabCertificados">0</span>
      </button>
      <button class="cat-tab" data-filter="formularios"         role="tab" onclick="setFilter('formularios')">
        📄 Formul. <span class="tab-count" id="tabFormularios">0</span>
      </button>
      <button class="cat-tab" data-filter="admissoes"           role="tab" onclick="setFilter('admissoes')">
        👤 Admis. <span class="tab-count" id="tabAdmissoes">0</span>
      </button>
      <button class="cat-tab" data-filter="licencas"            role="tab" onclick="setFilter('licencas')">
        🏛️ Licenças <span class="tab-count" id="tabLicencas">0</span>
      </button>
      <button class="cat-tab" data-filter="portal" id="tabPortalBtn" role="tab" style="display:none" onclick="setFilter('portal')">
        🏠 Portal <span class="tab-count" id="tabPortal">0</span>
      </button>
    </nav>

    <!-- ── Skeleton ── -->
    <div id="skeleton" class="skeleton-list">
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
    </div>

    <!-- ── Alerts list ── -->
    <main id="alertsContainer" class="alerts-list" style="display:none">
      <div id="alertsGrid"></div>
    </main>

    <!-- ── Empty state ── -->
    <div id="emptyState" class="empty-state">
      <div class="empty-icon">✅</div>
      <h3 class="empty-title">Tudo em ordem</h3>
      <p class="empty-sub">Nenhum alerta neste filtro.</p>
    </div>

  </div><!-- /#app -->

  <div id="toastContainer"></div>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const auth = await window.PortalAuthGuard.init(1, { returnAfterLogin: true });
      if (!auth) return;
      document.getElementById('authOverlay').remove();
      const app = document.getElementById('app');
      app.style.display = 'flex';
      app.style.flexDirection = 'column';
      initApp(auth);
    });
  </script>
</body>
</html>
