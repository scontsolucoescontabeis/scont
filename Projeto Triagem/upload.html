<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Triagem — SCONT</title>
  <link rel="icon" type="image/x-icon" href="../assets/favicon.ico" />
  <link rel="stylesheet" href="../shared.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="../supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../portal-auth-guard.js"></script>
  <style>
    body {
      min-height: 100vh;
    }

    .app-header {
      background: linear-gradient(135deg, #8B3A3A 0%, #2C3E50 100%);
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: var(--shadow-md);
    }
    .header-title { font-size: 18px; font-weight: 700; flex: 1; }
    .header-sub   { font-size: 12px; opacity: .7; }
    .btn-icon {
      background: rgba(255,255,255,.15);
      border: none;
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      cursor: pointer;
      font-size: 16px;
      color: #fff;
      transition: background .2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-icon:hover { background: rgba(255,255,255,.28); }

    .container { max-width: 760px; margin: 0 auto; padding: 32px 24px; }

    .upload-card {
      background: var(--card);
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 48px 32px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      box-shadow: var(--shadow-sm);
    }
    .upload-card:hover { border-color: var(--primary-light, #A85252); background: #FDF8F8; }
    .upload-card.drag  { border-color: var(--primary); background: #FDF5F5; }
    .upload-icon  { font-size: 52px; margin-bottom: 12px; }
    .upload-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .upload-sub   { font-size: 14px; color: var(--muted); }
    .upload-path  {
      display: inline-block;
      margin-top: 12px;
      font-size: 12px;
      font-family: monospace;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      color: var(--text-light);
    }
    #fileInput { display: none; }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
      margin-top: 20px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primary:hover    { background: var(--primary-hover); }
    .btn-primary:disabled { opacity: .5; cursor: default; }

    /* Status panel */
    .status-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-top: 24px;
      box-shadow: var(--shadow-sm);
      display: none;
    }
    .status-panel.show { display: block; }
    .status-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; color: var(--secondary); }

    .progress-bar-wrap {
      background: var(--bg);
      border-radius: 6px;
      height: 10px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary) 0%, #A85252 100%);
      border-radius: 6px;
      transition: width .3s ease;
      width: 0%;
    }

    .step-list { display: flex; flex-direction: column; gap: 8px; }
    .step-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--text-light);
    }
    .step-icon { font-size: 16px; width: 22px; text-align: center; flex-shrink: 0; }
    .step-item.done    { color: var(--success); }
    .step-item.active  { color: var(--text); font-weight: 600; }
    .step-item.error   { color: var(--danger); }

    .result-card {
      margin-top: 20px;
      padding: 16px 20px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      display: none;
    }
    .result-card.success { background: #EDFBF3; border: 1px solid #A8DFC0; color: #1A6B3A; display: block; }
    .result-card.error   { background: #FEF2F2; border: 1px solid #FCA5A5; color: #991B1B; display: block; }
    .result-card strong  { display: block; font-size: 14px; margin-bottom: 4px; }

    /* Summary chips */
    .summary-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .chip {
      background: rgba(139,58,58,.08);
      border: 1px solid rgba(139,58,58,.2);
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 12px;
      font-weight: 600;
      color: var(--primary);
    }

    /* Toast */
    #toastContainer { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast { background: var(--secondary); color: #fff; padding: 10px 16px; border-radius: var(--radius-sm); font-size: 13px; box-shadow: var(--shadow-md); animation: slideIn .25s ease; }
    .toast.success { background: var(--success); }
    .toast.error   { background: var(--danger); }
    @keyframes slideIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }
  </style>
</head>
<body>

<header class="app-header">
  <span style="font-size:26px">📤</span>
  <div style="flex:1">
    <div class="header-title">Upload — Triagem de Atendimentos</div>
    <div class="header-sub">Envia a planilha para o Supabase</div>
  </div>
  <a class="btn-icon" href="index.html">📋 Ver Triagem</a>
  <a class="btn-icon" href="../portal.html">🏠 Portal</a>
</header>

<div class="container">

  <!-- Drop zone -->
  <div class="upload-card" id="dropZone"
       onclick="document.getElementById('fileInput').click()"
       ondragover="onDragOver(event)"
       ondragleave="onDragLeave(event)"
       ondrop="onDrop(event)">
    <div class="upload-icon">📊</div>
    <div class="upload-title">Selecione ou arraste o arquivo</div>
    <div class="upload-sub">triagem_atendimento.xlsx</div>
    <div class="upload-path">Desktop\captura_messenger\Triagem de Atendimentos - Gestta\triagem_atendimento.xlsx</div>
    <br>
    <button class="btn-primary" onclick="event.stopPropagation(); document.getElementById('fileInput').click()">
      📂 Selecionar arquivo
    </button>
  </div>
  <input type="file" id="fileInput" accept=".xlsx,.xls" onchange="onFileSelected(event)" />

  <!-- Status panel -->
  <div class="status-panel" id="statusPanel">
    <div class="status-title">⚙️ Processando…</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="step-list" id="stepList"></div>
    <div class="result-card" id="resultCard"></div>
  </div>

</div>

<div id="toastContainer"></div>

<script>
// ── Auth ───────────────────────────────────────────────────────────────────
let _sb = null;
(async () => {
  const auth = await window.PortalAuthGuard.init(1);
  if (!auth) return;
  _sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
})();

// ── Drag & drop ────────────────────────────────────────────────────────────
function onDragOver(e)  { e.preventDefault(); document.getElementById('dropZone').classList.add('drag'); }
function onDragLeave()  { document.getElementById('dropZone').classList.remove('drag'); }
function onDrop(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file) processFile(file);
}
function onFileSelected(e) {
  const file = e.target.files[0];
  if (file) processFile(file);
  e.target.value = '';
}

// ── Parse (mesma lógica da ferramenta Triagem) ─────────────────────────────
function parseWorkbook(wb) {
  return {
    demandas  : parseTriagem(wb),
    resumo    : parseResumo(wb),
    conversas : parseTriagemCompleta(wb),
  };
}

function parseTriagem(wb) {
  const rows_out = [];
  const _alerts  = [];
  let   _enc     = '';
  const ws = wb.Sheets['Triagem'];
  if (!ws) return { rows: [], alerts: [], encText: '' };
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });

  let inAlerts = false, inEnc = false;
  for (let i = 2; i < rows.length; i++) {
    const r = rows[i];
    if (!r || r.every(c => c === null)) continue;
    const first = String(r[0] || '').trim();
    if (first.includes('ALERTAS'))        { inAlerts = true;  inEnc = false; continue; }
    if (first.includes('ENCAMINHAMENTO')) { inAlerts = false; inEnc = true;  continue; }
    if (inAlerts) { if (first) _alerts.push(first); continue; }
    if (inEnc)    { if (first) _enc += first + ' '; continue; }
    if (typeof r[0] === 'number') {
      rows_out.push({
        num   : r[0],
        cliente: String(r[1] || ''),
        dept  : String(r[2] || ''),
        cat   : String(r[3] || ''),
        sub   : String(r[4] || ''),
        func  : String(r[5] || ''),
        prazo : String(r[6] || ''),
        prio  : String(r[7] || ''),
        dados : String(r[8] || ''),
        pend  : String(r[9] || ''),
        dom   : String(r[10] || ''),
      });
    }
  }
  return { rows: rows_out, alerts: _alerts, encText: _enc.trim() };
}

function parseResumo(wb) {
  const out = { total: 0, byDept: {}, byPrio: {}, dataHora: '' };
  const ws  = wb.Sheets['Resumo'];
  if (!ws) return out;
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
  let mode = null;
  for (const r of rows) {
    if (!r || r.every(c => c === null)) continue;
    const k = String(r[0] || '').trim();
    const v = r[1];
    if (k.startsWith('Data/hora')) { out.dataHora = k.replace(/^Data\/hora geração:\s*/i, '').trim() || String(v || ''); continue; }
    if (k === 'Total de demandas:') { out.total = v; continue; }
    if (k === 'Por Departamento')   { mode = 'dept'; continue; }
    if (k === 'Por Prioridade')     { mode = 'prio'; continue; }
    if (k === 'Quantidade')         { continue; }
    if (mode === 'dept' && k && typeof v === 'number') out.byDept[k] = v;
    if (mode === 'prio' && k && typeof v === 'number') out.byPrio[k] = v;
  }
  return out;
}

function parseTriagemCompleta(wb) {
  const convs  = {};
  const wsName = wb.SheetNames.find(n => n.toLowerCase().includes('completa'));
  if (!wsName) return convs;
  const ws   = wb.Sheets[wsName];
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
  let curKey = null;

  for (const r of rows) {
    const line = String(r[0] || '').trim();
    if (!line) continue;
    const mContact = line.match(/CONTATO\s*:\s*(.+)/i);
    if (mContact) {
      const nameRaw = mContact[1].split(/\s*[|(+]/)[0].trim();
      curKey = normName(nameRaw);
      if (!convs[curKey]) convs[curKey] = { raw: nameRaw, aba: '', msgs: [] };
      continue;
    }
    const mAba = line.match(/ABA\s*:\s*(.+)/i);
    if (mAba && curKey) { convs[curKey].aba = mAba[1].trim(); continue; }
    if (!curKey) continue;
    if (/^[-=★]+$/.test(line.replace(/\s/g, ''))) continue;
    if (/^(PENDENTES|EM ATENDIMENTO|DIA:|Capturado em:|GESTTA|Última atualização|INSTRUÇÕES|Mantenha|============)/i.test(line)) { curKey = null; continue; }
    if (line === '(nenhuma mensagem no período)') {
      convs[curKey].msgs.push({ type: 'system', time: '', text: '(sem mensagens no período)' });
      continue;
    }
    const mMsg = line.match(/^(\d{2}\/\d{2}\/\d{4})\s*-\s*(\d{2}:\d{2})\s*(>>>)?\s*\[(CLIENTE|ATENDENTE)\]\s*(.*)/i);
    if (mMsg) {
      const [, date, time, , role, text] = mMsg;
      convs[curKey].msgs.push({ type: role.toLowerCase(), time: `${date} ${time}`, text: text.trim() });
    } else if (convs[curKey].msgs.length > 0) {
      const last = convs[curKey].msgs[convs[curKey].msgs.length - 1];
      if (last && last.type !== 'system') last.text += '\n' + line;
    }
  }
  return convs;
}

function normName(str) {
  return str.toLowerCase().replace(/[^a-z0-9]/g, ' ').replace(/\s+/g, ' ').trim();
}

// ── Upload ─────────────────────────────────────────────────────────────────
async function processFile(file) {
  if (!_sb) { toast('Aguarde a autenticação.', 'error'); return; }

  const panel = document.getElementById('statusPanel');
  panel.classList.add('show');
  document.getElementById('resultCard').style.display = 'none';
  document.getElementById('resultCard').className = 'result-card';
  setProgress(0);

  const steps = [
    { id: 'parse',     label: 'Lendo e interpretando a planilha…' },
    { id: 'clear',     label: 'Limpando dados anteriores no Supabase…' },
    { id: 'demandas',  label: 'Enviando demandas (aba Triagem)…' },
    { id: 'resumo',    label: 'Enviando resumo e alertas…' },
    { id: 'conversas', label: 'Enviando conversas (aba Triagem Completa)…' },
    { id: 'done',      label: 'Concluído!' },
  ];
  renderSteps(steps, null);

  try {
    // 1. Parse
    setStepState(steps, 'parse', 'active');
    const buf  = await file.arrayBuffer();
    const wb   = XLSX.read(buf, { type: 'array' });
    const { demandas: triResult, resumo, conversas } = parseWorkbook(wb);
    const { rows: demandasRows, alerts, encText } = triResult;
    setStepState(steps, 'parse', 'done');
    setProgress(15);

    // 2. Clear
    setStepState(steps, 'clear', 'active');
    const [e1, e2, e3] = await Promise.all([
      _sb.from('triagem_demandas').delete().gte('id', 0),
      _sb.from('triagem_resumo').delete().eq('id', 1),
      _sb.from('triagem_conversas').delete().gte('id', 0),
    ]);
    if (e1.error) throw new Error('Erro ao limpar demandas: ' + e1.error.message);
    if (e2.error) throw new Error('Erro ao limpar resumo: '   + e2.error.message);
    if (e3.error) throw new Error('Erro ao limpar conversas: ' + e3.error.message);
    setStepState(steps, 'clear', 'done');
    setProgress(30);

    // 3. Demandas
    setStepState(steps, 'demandas', 'active');
    if (demandasRows.length > 0) {
      const { error } = await _sb.from('triagem_demandas').insert(demandasRows);
      if (error) throw new Error('Erro ao inserir demandas: ' + error.message);
    }
    setStepState(steps, 'demandas', 'done');
    setProgress(55);

    // 4. Resumo
    setStepState(steps, 'resumo', 'active');
    const { error: errResumo } = await _sb.from('triagem_resumo').upsert({
      id        : 1,
      total     : resumo.total || demandasRows.length,
      by_dept   : resumo.byDept,
      by_prio   : resumo.byPrio,
      data_hora : resumo.dataHora,
      alerts    : alerts,
      enc_text  : encText,
      uploaded_at: new Date().toISOString(),
    });
    if (errResumo) throw new Error('Erro ao salvar resumo: ' + errResumo.message);
    setStepState(steps, 'resumo', 'done');
    setProgress(70);

    // 5. Conversas
    setStepState(steps, 'conversas', 'active');
    const convsRows = Object.entries(conversas).map(([key, c]) => ({
      contact_key: key,
      raw_name   : c.raw,
      aba        : c.aba,
      msgs       : c.msgs,
    }));
    if (convsRows.length > 0) {
      // Inserir em lotes de 50 para não exceder limites
      const BATCH = 50;
      for (let i = 0; i < convsRows.length; i += BATCH) {
        const { error } = await _sb.from('triagem_conversas').insert(convsRows.slice(i, i + BATCH));
        if (error) throw new Error('Erro ao inserir conversas: ' + error.message);
      }
    }
    setStepState(steps, 'conversas', 'done');
    setProgress(100);

    // 6. Done
    setStepState(steps, 'done', 'done');
    showResult('success',
      `✅ Upload concluído com sucesso!`,
      [
        `${demandasRows.length} demanda(s)`,
        `${Object.keys(conversas).length} conversa(s)`,
        `${alerts.length} alerta(s)`,
        resumo.dataHora ? `Referência: ${resumo.dataHora}` : '',
      ].filter(Boolean)
    );
    toast('Upload concluído!', 'success');

  } catch (err) {
    const active = steps.find(s => !['done'].includes(s.id) && document.getElementById('step_' + s.id)?.classList.contains('active'));
    if (active) setStepState(steps, active.id, 'error');
    showResult('error', '❌ Erro durante o upload', [err.message]);
    toast(err.message, 'error');
  }
}

// ── UI helpers ─────────────────────────────────────────────────────────────
function renderSteps(steps, activeId) {
  document.getElementById('stepList').innerHTML = steps.map(s => `
    <div class="step-item" id="step_${s.id}">
      <span class="step-icon">⏳</span>
      <span>${s.label}</span>
    </div>`).join('');
}

function setStepState(steps, id, state) {
  const el   = document.getElementById('step_' + id);
  if (!el) return;
  const icon = state === 'done' ? '✅' : state === 'active' ? '⏳' : state === 'error' ? '❌' : '⏳';
  el.className = 'step-item ' + state;
  el.querySelector('.step-icon').textContent = icon;
}

function setProgress(pct) {
  document.getElementById('progressFill').style.width = pct + '%';
}

function showResult(type, title, items) {
  const el = document.getElementById('resultCard');
  el.className = 'result-card ' + type;
  el.innerHTML = `<strong>${title}</strong>
    <div class="summary-chips">${items.map(i => `<span class="chip">${i}</span>`).join('')}</div>`;
}

function toast(msg, type = '') {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 5000);
}
</script>
</body>
</html>
