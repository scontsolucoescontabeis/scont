// ── CONSTANTS ──────────────────────────────────────────────
const SERIAL_JAN1_2025 = 44196; // 1904 date system, serial 0 = Jan 1 1904
const STD_H = 8/24, SAT_H = 4/24; // default workday hours as day-fraction

const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

const EVENTS = ['','FALTA','FOLGA','FOLGA COM COMPENSAÇÃO DE BANCO DE HORAS','ATESTADO MÉDICO'];

// ── DATE HELPERS ───────────────────────────────────────────
function serialToDate(s){return new Date(Date.UTC(2025,0,1)+(s-SERIAL_JAN1_2025)*86400000)}
function dateToSerial(d){return SERIAL_JAN1_2025+Math.round((d-Date.UTC(2025,0,1))/86400000)}
function weekday(d){return d.getUTCDay()+1} // 1=Sun…7=Sat (Excel convention)
// Todas as durações são armazenadas em minutos inteiros — zero erro de ponto flutuante
function timeToMin(s){if(!s)return null;const[h,m]=s.split(':').map(Number);return h*60+m}
function fmtHours(min){
  if(min===null||min===undefined||min==='')return'';
  const neg=min<0;const abs=Math.abs(min);
  return`${neg?'-':''}${Math.floor(abs/60)}h${abs%60>0?String(abs%60).padStart(2,'0')+'m':''}`;
}
function daysInMonth(year,month0){return new Date(Date.UTC(year,month0+1,0)).getUTCDate()}
function normalizeTime(v){
  const d=v.replace(/\D/g,'');
  if(!d) return '';
  if(d.length<=2) return d.padStart(2,'0')+':00';
  if(d.length===3) return '0'+d[0]+':'+d.slice(1);
  return d.slice(0,2)+':'+d.slice(2,4);
}

// ── FORMULA ENGINE — valores em minutos inteiros ───────────
function calcRow(entry, date, isHoliday, cfg){
  const {e1,s1,e2,s2,noturno,evento}=entry;
  const t1=timeToMin(e1),t2=timeToMin(s1),t3=timeToMin(e2),t4=timeToMin(s2);
  const hasEntries=t1!==null||t2!==null||t3!==null||t4!==null;
  const wd=weekday(date);

  // G: total minutos trabalhados (suporta overnight)
  let G=0;
  if(t1!==null&&t2!==null){G+=Math.max(0,t2<t1?t2+1440-t1:t2-t1)}
  if(t3!==null&&t4!==null){G+=Math.max(0,t4<t3?t4+1440-t3:t4-t3)}

  // I: HE 100% (minutos)
  const I=(isHoliday||wd===1)?G:0;

  // K: Banco de horas (minutos)
  let K;
  const std=cfg.stdHours*60, sat=cfg.satHours*60;
  if(evento==='ATESTADO MÉDICO'||evento==='FOLGA'){K=0}
  else if(!hasEntries&&!evento){K=0}
  else if(!isHoliday){
    if(wd>=2&&wd<=6) K=G-std;
    else if(wd===1) K=0;
    else K=G-sat;
  } else {K=G}

  // H: HE 50% / J: Horas negativas (minutos)
  const H=(I===0&&K>0)?K:0;
  const J=K<0?K:0;
  const L=timeToMin(noturno)||0;

  return{G,H,I,J,K,L}; // tudo em minutos inteiros
}

// ── STORAGE ────────────────────────────────────────────────
const STORAGE_KEY='pontoPatricia';

function loadState(){
  try{
    const s=JSON.parse(localStorage.getItem(STORAGE_KEY));
    if(s) return s;
    // migrar formato antigo
    const old=JSON.parse(localStorage.getItem('ponto2025'));
    if(old){
      const m={year:2025,years:{2025:{entries:old.entries||{},holidays:old.holidays}},config:old.config||{}};
      localStorage.setItem(STORAGE_KEY,JSON.stringify(m));
      return m;
    }
    return{};
  }catch{return{}}
}
function saveState(s){localStorage.setItem(STORAGE_KEY,JSON.stringify(s))}

function yearData(year){
  if(!STATE.years) STATE.years={};
  if(!STATE.years[year]) STATE.years[year]={};
  return STATE.years[year];
}

function getEntry(STATE,serial){
  const yd=yearData(STATE.year);
  return yd.entries&&yd.entries[serial]
    ?yd.entries[serial]
    :{e1:'',s1:'',e2:'',s2:'',noturno:'',evento:'',ignFer:false};
}

function getHolidays(STATE){
  const yd=yearData(STATE.year);
  return yd.holidays||defaultHolidays(STATE.year);
}

function getCfg(state){
  return Object.assign({stdHours:8,satHours:4},state.config||{});
}

// ── DEFAULT DATA ───────────────────────────────────────────
function computeEaster(Y){
  const a=Y%19,b=Math.floor(Y/100),c=Y%100,d=Math.floor(b/4),e=b%4,
    f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),
    h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,
    l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),
    month=Math.floor((h+l-7*m+114)/31),day=((h+l-7*m+114)%31)+1;
  return{month,day};
}

function defaultHolidays(year){
  const ser=(m,d)=>dateToSerial(Date.UTC(year,m-1,d));
  const list=[
    {serial:ser(1,1),name:'Confraternização Universal'},
    {serial:ser(4,21),name:'Tiradentes'},
    {serial:ser(5,1),name:'Dia do Trabalho'},
    {serial:ser(9,7),name:'Independência do Brasil'},
    {serial:ser(10,12),name:'Nossa Sra. Aparecida'},
    {serial:ser(11,2),name:'Finados'},
    {serial:ser(11,15),name:'Proclamação da República'},
    {serial:ser(11,20),name:'Consciência Negra'},
    {serial:ser(12,25),name:'Natal'},
  ];
  const{month,day}=computeEaster(year);
  const easter=ser(month,day);
  list.push({serial:easter-48,name:'Carnaval'});
  list.push({serial:easter-47,name:'Carnaval'});
  list.push({serial:easter-2,name:'Paixão de Cristo'});
  list.push({serial:easter+60,name:'Corpus Christi'});
  return list.sort((a,b)=>a.serial-b.serial);
}

// ── MONTH COMPUTATION ──────────────────────────────────────
function computeMonth(mi,year){
  year=year||STATE.year;
  const holidays = getHolidays(STATE);
  const cfg = getCfg(STATE);
  const holidaySet = new Set(holidays.map(h=>h.serial));
  const holidayName = {};
  holidays.forEach(h=>{holidayName[h.serial]=h.name;});

  const days=daysInMonth(year,mi);
  const firstDate = new Date(Date.UTC(year,mi,1));
  const firstSerial = dateToSerial(firstDate);

  // calcRow já retorna minutos inteiros — soma direta, sem conversão
  const rows=[];
  let accumMin=0;
  for(let d=0;d<days;d++){
    const serial=firstSerial+d;
    const date=serialToDate(serial);
    const wd=weekday(date);
    const isHol=holidaySet.has(serial);
    const entry=getEntry(STATE,serial);
    const effectiveHol=isHol&&!entry.ignFer;
    const r=calcRow(entry,date,effectiveHol,cfg);
    accumMin+=r.K;
    const M=accumMin;       // M em minutos
    rows.push({serial,date,wd,isHol,effectiveHol,holName:holidayName[serial]||'',entry,r,M});
  }
  const sumH=rows.reduce((a,x)=>a+x.r.H,0);
  const sumI=rows.reduce((a,x)=>a+x.r.I,0);
  const sumJ=rows.filter(x=>x.r.J<0).reduce((a,x)=>a+x.r.J,0);
  const sumK=rows.reduce((a,x)=>a+x.r.K,0);
  const sumL=rows.reduce((a,x)=>a+x.r.L,0);
  const lastM=rows.length?rows[rows.length-1].M:0;
  return{rows,sumH,sumI,sumJ,sumK,sumL,lastM};
}

// ── RENDER HELPERS ─────────────────────────────────────────
function cls(v,neutral=''){
  if(v>0) return 'pos';
  if(v<0) return 'neg';
  return neutral;
}

// ── RENDER NAV ─────────────────────────────────────────────
function renderNav(){
  const nav=document.getElementById('sidebarNav');
  const years=Object.keys(STATE.years||{}).map(Number).sort();

  const yearPills=years.map(y=>`<button class="year-pill${y===STATE.year?' active':''}" onclick="switchYear(${y})">${y}</button>`).join('')
    +`<button class="year-pill add" onclick="promptAddYear()">+ Ano</button>`;

  const tabs=[
    {id:'dashboard',label:'📊 Dashboard',section:''},
    ...MONTHS.map((m,i)=>({id:'m'+i,label:m,section:i===0?'Meses':''})),
    {id:'feriados',label:'⚙ Feriados / Config',section:'Config'}
  ];
  let html=`<div class="sidebar-section">Ano</div><div class="year-pills">${yearPills}</div>`;
  tabs.forEach(t=>{
    if(t.section) html+=`<div class="sidebar-section">${t.section}</div>`;
    html+=`<button onclick="showTab('${t.id}')" id="tab-${t.id}">${t.label}</button>`;
  });
  nav.innerHTML=html;
}

function switchYear(year){
  if(!STATE.years[year]) STATE.years[year]={};
  if(!STATE.years[year].holidays) STATE.years[year].holidays=defaultHolidays(year);
  STATE.year=year;
  saveState(STATE);
  renderNav();
  renderAll();
  showTab('dashboard');
}

function promptAddYear(){
  const y=parseInt(prompt('Digite o ano (ex: 2026):'));
  if(!y||y<2020||y>2100){alert('Ano inválido.');return;}
  switchYear(y);
}

// ── DASHBOARD ──────────────────────────────────────────────
function renderDashboard(){
  const year=STATE.year;
  const months=MONTHS.map((_,i)=>computeMonth(i,year));
  const rows=MONTHS.map((m,i)=>{
    const mo=months[i];
    const neg=mo.sumJ;
    const ext=mo.sumH+mo.sumI;
    const sal=mo.lastM;
    return{m,neg,ext,sal};
  });
  const totNeg=rows.reduce((a,r)=>a+r.neg,0);
  const totExt=rows.reduce((a,r)=>a+r.ext,0);
  const totSal=rows.reduce((a,r)=>a+r.sal,0);

  let html=`<div class="view" id="view-dashboard"><h2>Dashboard de Controle Anual – ${year}</h2>
<div class="month-wrap"><table class="dash-table">
<tr><th>Mês</th><th>Horas Negativas</th><th>Horas Extras</th><th>Saldo Banco de Horas</th></tr>`;
  rows.forEach(r=>{
    html+=`<tr><td>${r.m}</td>
<td class="${cls(r.neg)}">${fmtHours(r.neg)||'–'}</td>
<td class="${cls(r.ext)}">${fmtHours(r.ext)||'–'}</td>
<td class="${cls(r.sal)}">${fmtHours(r.sal)||'–'}</td></tr>`;
  });
  html+=`<tr style="background:#F0F2F5;font-weight:700;border-top:2px solid #8B3A3A"><td>2025 TOTAL</td>
<td class="${cls(totNeg)}">${fmtHours(totNeg)}</td>
<td class="${cls(totExt)}">${fmtHours(totExt)}</td>
<td class="${cls(totSal)}">${fmtHours(totSal)}</td></tr>
</table></div></div>`;
  return html;
}

function renderMonth(mi){
  const mo=computeMonth(mi,STATE.year);
  const {rows,sumH,sumI,sumJ,sumK,sumL,lastM}=mo;

  let tbl=`<div class="month-wrap"><table class="main">
<tr>
<th>Data</th><th>Dia</th>
<th>Entrada</th><th>Saída</th><th>Entrada</th><th>Saída</th>
<th>Total H.</th>
<th class="col-he50">HE 50%</th><th class="col-he100">HE 100%</th>
<th class="col-neg">H.Neg.</th><th class="col-bank">Banco</th>
<th>Noturno</th><th class="col-acc">B.Acum.</th>
<th>Feriado</th><th title="Ignorar feriado: usa regra do evento/dia da semana">Ign.Fer</th><th>Evento</th>
</tr>`;

  rows.forEach(({serial,date,wd,isHol,effectiveHol,holName,entry,r,M})=>{
    const isSun=wd===1,isSat=wd===7;
    let rowCls='';
    if(effectiveHol) rowCls='holiday';
    else if(isSun||isSat) rowCls='weekend';
    if(entry.evento) rowCls='event-row';

    const day=date.getUTCDate();
    const mon=date.getUTCMonth()+1;
    const dateStr=`${String(day).padStart(2,'0')}/${String(mon).padStart(2,'0')}`;
    const dayName=DIAS_PT[wd-1];

    tbl+=`<tr class="${rowCls}" data-serial="${serial}">
<td>${dateStr}</td>
<td>${dayName}</td>
<td><input class="time-input" data-field="e1" data-serial="${serial}" value="${entry.e1}" placeholder="--:--"></td>
<td><input class="time-input" data-field="s1" data-serial="${serial}" value="${entry.s1}" placeholder="--:--"></td>
<td><input class="time-input" data-field="e2" data-serial="${serial}" value="${entry.e2}" placeholder="--:--"></td>
<td><input class="time-input" data-field="s2" data-serial="${serial}" value="${entry.s2}" placeholder="--:--"></td>
<td>${r.G>0?fmtHours(r.G):''}</td>
<td class="col-he50">${r.H>0?fmtHours(r.H):''}</td>
<td class="col-he100">${r.I>0?fmtHours(r.I):''}</td>
<td class="col-neg">${r.J<0?fmtHours(r.J):''}</td>
<td class="${cls(r.K)}">${r.K!==0?fmtHours(r.K):''}</td>
<td><input class="time-input" data-field="noturno" data-serial="${serial}" value="${entry.noturno}" placeholder="--:--"></td>
<td class="${cls(M)}">${M!==0?fmtHours(M):''}</td>
<td>${holName?`<span class="feriado-badge">${holName}</span>`:''}</td>
<td><div class="ign-fer-wrap">${isHol?`<input type="checkbox" class="ign-fer" data-serial="${serial}"${entry.ignFer?' checked':''}>`:''}
</div></td>
<td><select class="evt-sel" data-field="evento" data-serial="${serial}">
${EVENTS.map(e=>`<option value="${e}"${entry.evento===e?' selected':''}>${e||'–'}</option>`).join('')}
</select></td>
</tr>`;
  });

  // Summary
  tbl+=`<tr class="total-row">
<td colspan="7">TOTAL</td>
<td class="col-he50">${fmtHours(sumH)}</td>
<td class="col-he100">${fmtHours(sumI)}</td>
<td class="col-neg">${sumJ<0?fmtHours(sumJ):''}</td>
<td class="${cls(sumK)}">${fmtHours(sumK)}</td>
<td></td><td class="${cls(lastM)}">${fmtHours(lastM)}</td>
<td colspan="3"></td></tr></table></div>`;

  const boxes=[
    {label:'HE 100%',val:sumI,cls:'col-he100'},
    {label:'H. Negativas',val:sumJ,cls:'col-neg'},
    {label:'HE 50%',val:sumH,cls:'col-he50'},
    {label:'Banco do Mês',val:sumH+sumI+sumJ,cls:cls(sumH+sumI+sumJ)},
  ];
  const sumBoxes=`<div class="summary-section" id="summary-m${mi}">${boxes.map(b=>`
<div class="summary-box">
<label>${b.label}</label>
<div class="val ${b.cls}">${b.val?fmtHours(b.val):'–'}</div>
</div>`).join('')}</div>`;

  return`<div class="view" id="view-m${mi}"><h2>${MONTHS[mi]}</h2>${tbl}${sumBoxes}</div>`;
}

    if(!yd.entries[serial]) yd.entries[serial]={e1:'',s1:'',e2:'',s2:'',noturno:'',evento:'',ignFer:false};

    if(t.classList.contains('time-input')){
      const norm=normalizeTime(t.value);
      t.value=norm;
      yd.entries[serial][t.dataset.field]=norm;
    } else if(t.classList.contains('evt-sel')){
      yd.entries[serial].evento=t.value;
    } else if(t.classList.contains('ign-fer')){
      yd.entries[serial].ignFer=t.checked;
    } else return;

    saveState(STATE);
    refreshCurrentMonth();
  });

  views.addEventListener('blur',e=>{
    const t=e.target;
    if(!t.classList.contains('time-input')) return;
    const norm=normalizeTime(t.value);
    t.value=norm;
    t.style.borderColor=(norm&&!/^\d{2}:\d{2}$/.test(norm))?'#E74C3C':'#E0E6ED';
  },true);
}

function attachMonthListeners(){} // no-op: listeners são delegados via initListeners

function refreshCurrentMonth(){
  const active=document.querySelector('.sidebar-nav button.active');
  if(!active) return;
  const id=active.id.replace('tab-','');
  if(!id.startsWith('m')) return;
  const mi=parseInt(id.slice(1));
  const mo=computeMonth(mi);
  const {rows,sumH,sumI,sumJ,lastM}=mo;

  // Atualiza apenas células de fórmula — não toca nos inputs
  // Índices dos td por linha:
  // 0:data 1:dia 2:e1 3:s1 4:e2 5:s2 6:TotalH 7:HE50 8:HE100 9:HNeg 10:Banco 11:noturno 12:BAcum 13:Feriado 14:IgnFer 15:Evento
  rows.forEach(({serial,wd,effectiveHol,entry,r,M})=>{
    const tr=document.querySelector(`tr[data-serial="${serial}"]`);
    if(!tr) return;
    const isSun=wd===1,isSat=wd===7;
    let rowCls='';
    if(effectiveHol) rowCls='holiday';
    else if(isSun||isSat) rowCls='weekend';
    if(entry.evento) rowCls='event-row';
    tr.className=rowCls;
    const td=tr.children;
    td[6].textContent=r.G>0?fmtHours(r.G):'';
    td[7].className='col-he50'; td[7].textContent=r.H>0?fmtHours(r.H):'';
    td[8].className='col-he100'; td[8].textContent=r.I>0?fmtHours(r.I):'';
    td[9].className='col-neg'; td[9].textContent=r.J<0?fmtHours(r.J):'';
    td[10].className=cls(r.K); td[10].textContent=r.K!==0?fmtHours(r.K):'';
    td[12].className=cls(M); td[12].textContent=M!==0?fmtHours(M):'';
  });

  // Atualiza summary boxes
  const sumEl=document.getElementById('summary-m'+mi);
  if(sumEl){
    const boxes=[
      {label:'HE 100%',val:sumI,c:'col-he100'},
      {label:'H. Negativas',val:sumJ,c:'col-neg'},
      {label:'HE 50%',val:sumH,c:'col-he50'},
      {label:'Banco do Mês',val:sumH+sumI+sumJ,c:cls(sumH+sumI+sumJ)},
    ];
    sumEl.innerHTML=boxes.map(b=>`<div class="summary-box"><label>${b.label}</label><div class="val ${b.c}">${b.val?fmtHours(b.val):'–'}</div></div>`).join('');
  }

  // Atualiza dashboard (sem inputs, seguro substituir)
  document.getElementById('view-dashboard').outerHTML=renderDashboard();
}

// ── FERIADO ACTIONS ────────────────────────────────────────
function addFeriado(){
  const h=getHolidays(STATE);
  h.push({serial:dateToSerial(Date.UTC(STATE.year,0,1)),name:'Novo Feriado'});
  yearData(STATE.year).holidays=h;
  saveState(STATE);
  document.getElementById('view-feriados').outerHTML=renderFeriados();
}

function deleteFeriado(i){
  const h=getHolidays(STATE);
  h.splice(i,1);
  yearData(STATE.year).holidays=h;
  saveState(STATE);
  document.getElementById('view-feriados').outerHTML=renderFeriados();
}

function saveFeriados(){
  const dates=document.querySelectorAll('.fer-date');
  const names=document.querySelectorAll('.fer-name');
  const h=[];
  dates.forEach((d,i)=>{
    const dt=new Date(d.value+'T00:00:00Z');
    const serial=dateToSerial(dt.getTime());
    h.push({serial,name:names[i].value});
  });
  yearData(STATE.year).holidays=h.sort((a,b)=>a.serial-b.serial);
  saveState(STATE);
  // re-render everything
  renderAll();
  showTab('feriados');
  alert('Feriados salvos com sucesso!');
}

function saveCfg(){
  STATE.config={
    stdHours:parseFloat(document.getElementById('cfg-std').value)||8,
    satHours:parseFloat(document.getElementById('cfg-sat').value)||4,
  };
  saveState(STATE);
  renderAll();
  showTab('feriados');
}

// ── NAVIGATION ─────────────────────────────────────────────
let currentTab='dashboard';
function showTab(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.sidebar-nav button').forEach(b=>b.classList.remove('active'));
  const v=document.getElementById('view-'+id);
  if(v) v.classList.add('active');
  const b=document.getElementById('tab-'+id);
  if(b) b.classList.add('active');
  currentTab=id;
}

// ── INIT ───────────────────────────────────────────────────
renderNav();
renderAll();
initListeners();
showTab('dashboard');

_ov.addEventListener('click',()=>{_sb.classList.remove('open');_ov.classList.remove('show');});
