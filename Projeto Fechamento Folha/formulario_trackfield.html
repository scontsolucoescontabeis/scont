<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folha de Pagamento – Track &amp; Field – SCONT</title>
<script src="../supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../portal-auth-guard.js"></script>
<style>
:root {
  --primary:       #1a6b3a;
  --primary-dark:  #0e4025;
  --primary-light: #2d8c53;
  --prov-color:    #1a6b2e;
  --prov-bg:       #f0faf3;
  --prov-border:   #6abf7b;
  --desc-color:    #b5281c;
  --desc-bg:       #fff5f5;
  --desc-border:   #e88080;
  --info-color:    #1549b8;
  --info-bg:       #f0f5ff;
  --info-border:   #7aa3e8;
  --fixed-color:   #3a3a3a;
  --fixed-bg:      #f8f8f8;
  --fixed-border:  #c0c0c0;
  --border:        #e2e2e2;
  --bg:            #eef0f5;
  --surface:       #fff;
  --text:          #2C3E50;
  --text-sec:      #7F8C8D;
  --radius:        10px;
  --row-h:         42px;
  --h-header:  60px;
  --h-toolbar: 54px;
  --h-legend:  30px;
  --h-hgroup:  34px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; background: var(--bg); color: var(--text); }

/* ─── HEADER ─── */
.header {
  background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
  color: #fff; padding: 0 24px; height: 60px;
  display: flex; align-items: center; gap: 16px;
  position: sticky; top: 0; z-index: 300;
  box-shadow: 0 3px 12px rgba(0,0,0,.3);
}
.header-brand { display: flex; align-items: center; gap: 12px; }
.header-brand img { height: 30px; filter: brightness(0) invert(1); }
.vline { width: 1px; height: 32px; background: rgba(255,255,255,.25); }
.header-title { font-size: 14px; font-weight: 700; letter-spacing: .2px; }
.header-sub   { font-size: 11px; opacity: .7; margin-top: 1px; }
.comp-pill {
  display: flex; align-items: center; gap: 7px;
  background: rgba(255,255,255,.14); border: 1px solid rgba(255,255,255,.22);
  border-radius: 20px; padding: 5px 14px; font-size: 12px;
}
.comp-pill label { opacity: .75; white-space: nowrap; }
.comp-pill input {
  background: transparent; border: none; outline: none; color: #fff;
  font-size: 13px; font-weight: 700; width: 80px; font-family: inherit; text-align: center;
}
.comp-pill input::placeholder { color: rgba(255,255,255,.5); }
.comp-pill select {
  background: transparent; border: none; outline: none; color: #fff;
  font-size: 12px; font-weight: 600; font-family: inherit; cursor: pointer;
  max-width: 220px;
}
.comp-pill select option { background: #0e4025; color: #fff; }
.hspacer { flex: 1; }
.hbtn {
  display: flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,.13); border: 1px solid rgba(255,255,255,.25);
  color: #fff; border-radius: 8px; padding: 7px 14px; cursor: pointer;
  font-size: 12px; font-weight: 600; transition: background .15s;
}
.hbtn:hover        { background: rgba(255,255,255,.26); }
.hbtn.saved        { background: rgba(39,174,96,.45); border-color: rgba(39,174,96,.7); }
.hbtn-enviar       { background: rgba(39,174,96,.3); border-color: rgba(39,174,96,.6); font-weight:700; }
.hbtn-enviar:hover { background: rgba(39,174,96,.55); }

/* ─── TOOLBAR ─── */
.toolbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 10px 24px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  position: sticky; top: 60px; z-index: 200;
  box-shadow: 0 2px 6px rgba(0,0,0,.06);
}
.tbtn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px; border-radius: 8px; border: 1.5px solid transparent;
  cursor: pointer; font-size: 12px; font-weight: 600; transition: all .15s;
}
.tbtn:hover { filter: brightness(.93); }
.tbtn-primary { background: var(--primary); color: #fff; }
.tbtn-prov    { background: var(--prov-color); color: #fff; }
.tbtn-desc    { background: var(--desc-color); color: #fff; }
.tbtn-info    { background: var(--info-color); color: #fff; }
.tbtn-neutral { background: #6c757d; color: #fff; }
.toolbar-hint { margin-left: auto; font-size: 11px; color: var(--text-sec); background: #f7f7f7; border-radius: 6px; padding: 5px 10px; }

/* ─── LEGEND ─── */
.legend-strip {
  display: flex; gap: 20px; padding: 7px 24px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  font-size: 11px; color: var(--text-sec); flex-wrap: wrap; align-items: center;
  position: sticky;
  top: calc(var(--h-header) + var(--h-toolbar));
  z-index: 190;
  height: var(--h-legend);
}
.leg-item { display: flex; align-items: center; gap: 6px; }
.leg-dot  { width: 10px; height: 10px; border-radius: 3px; }
.leg-save { margin-left: auto; font-size: 11px; color: var(--text-sec); font-style: italic; }

/* ─── PAGE ─── */
.page { padding: 20px 24px 80px; }

/* ─── SECTION CARD ─── */
.section-card {
  background: var(--surface); border-radius: var(--radius);
  box-shadow: 0 2px 12px rgba(0,0,0,.08);
  margin-bottom: 24px;
}
.section-header {
  padding: 14px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px; background: #fafafa;
}
.section-header h3 { font-size: 13px; font-weight: 700; color: var(--text); }
.section-header .badge {
  font-size: 10px; font-weight: 700; border-radius: 20px;
  padding: 2px 8px; background: var(--primary); color: #fff;
}

/* ─── TABLE ─── */
.table-scroll {
  overflow-x: auto;
  overflow-y: auto;
  max-height: calc(100vh - var(--h-header) - var(--h-toolbar) - var(--h-legend) - 60px);
}
table { border-collapse: separate; border-spacing: 0; width: 100%; min-width: 1600px; }

thead tr.h-group th {
  padding: 8px 6px; text-align: center; font-size: 10px; font-weight: 800;
  letter-spacing: .8px; text-transform: uppercase; border-bottom: none;
  border-right: 1px solid rgba(255,255,255,.2);
  position: sticky; top: 0; z-index: 12;
}
.hg-fixed { background: #3a3a3a; color: #fff; }
.hg-prov  { background: var(--prov-color); color: #fff; }
.hg-desc  { background: var(--desc-color); color: #fff; }
.hg-info  { background: var(--info-color); color: #fff; }

thead tr.h-main th {
  padding: 9px 8px; text-align: center; font-size: 10px; font-weight: 700;
  white-space: nowrap; border-bottom: 2px solid rgba(0,0,0,.15);
  border-right: 1px solid rgba(255,255,255,.15);
  position: sticky; top: var(--h-hgroup); z-index: 11;
}
.hm-fixed { background: #555; color: #fff; }
.hm-prov  { background: #2d9148; color: #fff; }
.hm-desc  { background: #d44030; color: #fff; }
.hm-info  { background: #2e65d4; color: #fff; }

th.extra-col-header { position: relative; }
.del-col-btn {
  position: absolute; top: 3px; right: 3px;
  background: rgba(0,0,0,.25); border: none; cursor: pointer;
  color: #fff; font-size: 10px; width: 16px; height: 16px;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  padding: 0; line-height: 1;
}
.del-col-btn:hover { background: rgba(220,53,69,.8); }

tbody tr { transition: background .12s; }
tbody tr:nth-child(even) { background: #fafbfc; }
tbody tr:nth-child(odd)  { background: #fff; }
tbody tr:hover           { background: #f0faf3 !important; }
tbody tr.row-active      { background: #f0faf3 !important; }

tbody td {
  border-bottom: 1px solid #ebebeb;
  border-right: 1px solid #ebebeb;
  padding: 0; vertical-align: middle;
  height: var(--row-h);
}

td.grp-start-prov  { border-left: 3px solid var(--prov-border) !important; }
td.grp-start-desc  { border-left: 3px solid var(--desc-border) !important; }
td.grp-start-info  { border-left: 3px solid var(--info-border) !important; }

td.td-num {
  width: 44px; min-width: 44px; text-align: center;
  background: linear-gradient(180deg,#f5f5f5,#ededed);
  border-right: 2px solid #ddd !important;
  padding: 4px 0;
}
.row-num       { font-size: 10px; color: #aaa; display: block; line-height: 1.2; }
.del-row-btn {
  background: none; border: none; cursor: pointer; color: #dc3545;
  font-size: 12px; padding: 0; line-height: 1;
  width: 20px; height: 20px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; margin: 2px auto 0;
  opacity: 0; transition: opacity .15s;
}
tbody tr:hover .del-row-btn { opacity: 1; }
.del-row-btn:hover { background: #fde8e8; }

.cell-wrap {
  padding: 4px 6px; height: var(--row-h); display: flex; align-items: center;
}
.cell-input {
  width: 100%; border: 1px solid transparent; border-radius: 6px;
  background: transparent; font-size: 12px; font-family: inherit;
  padding: 5px 8px; outline: none; color: var(--text);
  transition: background .12s, border-color .12s, box-shadow .12s;
  height: 30px;
}
.cell-input:hover  { background: rgba(0,0,0,.03); border-color: #d0d0d0; }
.cell-input:focus  { background: #f0faf3; border-color: #27ae60; box-shadow: 0 0 0 3px rgba(39,174,96,.12); }
.cell-input[type="number"],
.cell-input.is-number { text-align: right; }

td[data-g="prov"] .cell-input:focus { background: var(--prov-bg); border-color: var(--prov-border); box-shadow: 0 0 0 3px rgba(26,107,46,.1); }
td[data-g="desc"] .cell-input:focus { background: var(--desc-bg); border-color: var(--desc-border); box-shadow: 0 0 0 3px rgba(181,40,28,.1); }
td[data-g="info"] .cell-input:focus { background: var(--info-bg); border-color: var(--info-border); box-shadow: 0 0 0 3px rgba(21,73,184,.1); }

/* ── FOOTER ── */
tfoot tr { background: linear-gradient(135deg, #2C3E50, #34495e) !important; }
tfoot td {
  border: none; border-top: 2px solid #4a5568;
  padding: 10px 8px; font-size: 11px; color: #ecf0f1;
  text-align: right; white-space: nowrap; height: 40px; vertical-align: middle;
}
tfoot td.ft-num   { background: #1a252f; text-align: center; color: #7f8c8d; font-size: 10px; width: 44px; }
tfoot td.ft-label { color: #bdc3c7; font-size: 11px; font-weight: 400; padding-right: 12px; }
tfoot td.ft-val   { font-weight: 700; font-size: 12px; }
tfoot td.ft-prov  { color: #a8e6bc; }
tfoot td.ft-desc  { color: #f5b8b4; }
tfoot td.ft-info  { color: #b8d0f5; }
tfoot td.ft-fixed { color: #ecf0f1; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 9999;
  display: flex; align-items: center; gap: 10px;
  background: #2C3E50; color: #fff;
  padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 600;
  box-shadow: 0 6px 24px rgba(0,0,0,.25);
  transform: translateY(0); opacity: 1; transition: opacity .35s, transform .35s;
  pointer-events: none;
}
.toast.hide      { opacity: 0; transform: translateY(14px); }
.toast.success   { border-left: 4px solid #27ae60; }
.toast.info      { border-left: 4px solid #3498db; }
.toast.warn      { border-left: 4px solid #f39c12; }
.toast-icon      { font-size: 16px; }

/* ── MODAL ── */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45);
  z-index: 500; align-items: center; justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal-box {
  background: #fff; border-radius: 14px; box-shadow: 0 12px 48px rgba(0,0,0,.22);
  padding: 28px 32px; width: 360px; max-width: 95vw;
}
.modal-box h3   { font-size: 16px; color: var(--primary); margin-bottom: 20px; font-weight: 700; }
.modal-field    { margin-bottom: 16px; }
.modal-field label { display: block; font-size: 11px; font-weight: 700; color: var(--text-sec); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .4px; }
.modal-field input, .modal-field select {
  width: 100%; padding: 10px 12px; border: 1.5px solid var(--border);
  border-radius: 8px; font-size: 13px; font-family: inherit; outline: none;
  transition: border-color .15s, box-shadow .15s;
}
.modal-field input:focus, .modal-field select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,107,58,.12); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

/* ── MODAL RESUMO ── */
.modal-resumo { width: 96vw; max-width: 1400px; max-height: 92vh; display: flex; flex-direction: column; padding: 0; overflow: hidden; }
.modal-resumo-head { padding: 20px 28px 14px; border-bottom: 1px solid var(--border); }
.modal-resumo-head h3 { margin: 0; }
.modal-resumo-meta { display: flex; gap: 24px; margin-top: 10px; flex-wrap: wrap; }
.resumo-meta-item { font-size: 12px; color: var(--text-sec); }
.resumo-meta-item strong { color: var(--text); font-size: 13px; }
.modal-resumo-body { flex: 1; overflow-y: auto; padding: 16px 28px; }
.resumo-section { margin-bottom: 20px; }
.resumo-section-title { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .7px; color: var(--text-sec); margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
.resumo-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.resumo-table th { background: #f5f5f5; padding: 6px 10px; text-align: left; font-size: 11px; font-weight: 700; border-bottom: 1px solid var(--border); }
.resumo-table td { padding: 5px 10px; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
.resumo-table tr:last-child td { border-bottom: none; }
.resumo-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
.resumo-totais { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 14px; }
.resumo-total-card { background: #f8f8f8; border-radius: 8px; padding: 10px 16px; flex: 1; min-width: 140px; }
.resumo-total-card .rtc-label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--text-sec); }
.resumo-total-card .rtc-val { font-size: 16px; font-weight: 700; margin-top: 2px; }
.rtc-prov .rtc-val { color: var(--prov-color); }
.rtc-desc .rtc-val { color: var(--desc-color); }
.rtc-func .rtc-val { color: var(--primary); }
.modal-resumo-foot { padding: 14px 28px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; align-items: center; }
.btn-confirmar { background: #27ae60; color: #fff; border: none; border-radius: 8px; padding: 10px 22px; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 7px; transition: background .15s; }
.btn-confirmar:hover { background: #1e8449; }
.btn-confirmar:disabled { background: #95a5a6; cursor: not-allowed; }
.btn-cancelar-resumo { background: transparent; border: 1.5px solid var(--border); color: var(--text); border-radius: 8px; padding: 10px 18px; font-size: 13px; cursor: pointer; }
.btn-cancelar-resumo:hover { background: #f0f0f0; }

@media print {
  .header, .toolbar, .legend-strip { display: none; }
  body { background: #fff; font-size: 11px; }
  .section-card { box-shadow: none; border: 1px solid #ccc; }
  .del-row-btn, .del-col-btn { display: none; }
  .cell-input { border: none !important; box-shadow: none !important; background: transparent !important; }
  thead tr.h-group th, thead tr.h-main th { position: static; top: auto; }
  tfoot tr { background: #eee !important; }
  tfoot td { color: #000 !important; border-top: 1px solid #ccc !important; }
}
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<div class="header">
  <div class="header-brand">
    <img src="https://scontdf.com.br/wp-content/uploads/2019/11/logo-scont-1024x363.png" alt="SCONT">
    <div class="vline"></div>
    <div>
      <div class="header-title">Folha de Pagamento · Track &amp; Field</div>
      <div class="header-sub">Código TF · Fechamento mensal</div>
    </div>
  </div>
  <div class="comp-pill">
    <label>Competência</label>
    <input id="competencia" placeholder="MM/AAAA" maxlength="7">
  </div>
  <div class="comp-pill">
    <label>Tipo da Folha</label>
    <select id="tipoFolha">
      <option value="11">11 – Folha Mensal</option>
      <option value="41">41 – Adiantamento Salarial</option>
      <option value="42">42 – Folha Complementar</option>
      <option value="51">51 – Adiantamento de 13º Salário</option>
      <option value="52">52 – 13º Salário (integral ou 2ª parcela)</option>
      <option value="70">70 – PLR (Participação nos Lucros e Resultados)</option>
    </select>
  </div>
  <div class="hspacer"></div>
  <a href="index.html" class="hbtn" style="text-decoration:none;">← Fechamento Folha</a>
  <button class="hbtn" id="btnSave" onclick="salvarLocal()">💾 Salvar rascunho</button>
  <button class="hbtn" onclick="exportCSV()">⬇ Exportar CSV</button>
  <button class="hbtn" onclick="window.print()">🖨 Imprimir</button>
  <button class="hbtn hbtn-enviar" onclick="abrirResumoEnvio()">📤 Enviar para Fechamento</button>
</div>

<!-- ═══ TOOLBAR ═══ -->
<div class="toolbar">
  <button class="tbtn tbtn-primary" onclick="addEmployee()">➕ Colaborador</button>
  <button class="tbtn tbtn-prov"    onclick="abrirModalRubrica('prov')">➕ Provento</button>
  <button class="tbtn tbtn-desc"    onclick="abrirModalRubrica('desc')">➕ Desconto</button>
  <button class="tbtn tbtn-info"    onclick="abrirModalRubrica('info')">➕ Informativo</button>
  <div class="toolbar-hint">💡 Cole células do Excel direto na tabela · Tab / Enter para navegar</div>
</div>

<!-- ═══ LEGEND ═══ -->
<div class="legend-strip">
  <div class="leg-item"><div class="leg-dot" style="background:#555"></div> Dados fixos</div>
  <div class="leg-item"><div class="leg-dot" style="background:var(--prov-color)"></div> Proventos</div>
  <div class="leg-item"><div class="leg-dot" style="background:var(--desc-color)"></div> Descontos</div>
  <div class="leg-item"><div class="leg-dot" style="background:var(--info-color)"></div> Informativos</div>
  <span class="leg-save" id="legSave"></span>
</div>

<!-- ═══ PAGE ═══ -->
<div class="page">
  <div class="section-card">
    <div class="section-header">
      <h3>🏪 Lançamentos de Folha · Track &amp; Field</h3>
      <span class="badge" id="badgeCount">0 colaboradores</span>
    </div>
    <div class="table-scroll">
      <table id="payroll-table">
        <thead>
          <tr class="h-group" id="header-group"></tr>
          <tr class="h-main"  id="header-row"></tr>
        </thead>
        <tbody id="payroll-body"></tbody>
        <tfoot><tr id="footer-row"></tr></tfoot>
      </table>
    </div>
  </div>
</div>

<!-- ═══ MODAL RUBRICA ═══ -->
<div class="modal-overlay" id="modalResumoEnvio" onclick="if(event.target===this)fecharResumoEnvio()"></div>

<div class="modal-overlay" id="modalRubrica">
  <div class="modal-box">
    <h3 id="modalTitulo">Nova Rubrica</h3>
    <div class="modal-field">
      <label>Nome da Rubrica *</label>
      <input type="text" id="modalNome" placeholder="Ex: Adicional de Insalubridade">
    </div>
    <div class="modal-field">
      <label>Tipo de Valor</label>
      <select id="modalTipo">
        <option value="money">Monetário (R$)</option>
        <option value="hours">Horas (HH:MM)</option>
        <option value="days">Dias</option>
        <option value="text">Texto livre</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="tbtn tbtn-neutral" onclick="fecharModal()">Cancelar</button>
      <button class="tbtn tbtn-primary" onclick="confirmarRubrica()">Adicionar</button>
    </div>
  </div>
</div>

<!-- ═══ TOAST ═══ -->
<div class="toast hide" id="toast"><span class="toast-icon"></span><span id="toastMsg"></span></div>

<script>
// ══════════════════════════════════════════════════════
//  CONSTANTES
// ══════════════════════════════════════════════════════
const EMPRESA_CODIGO = 'TF';
const LS_KEY = 'trackfield_folha_v1';

// ══════════════════════════════════════════════════════

// ══════════════════════════════════════════════════════

  fixed: {label:'IDENTIFICAÇÃO',  hgClass:'hg-fixed', hmClass:'hm-fixed', ftClass:'ft-fixed'},
  prov:  {label:'PROVENTOS',      hgClass:'hg-prov',  hmClass:'hm-prov',  ftClass:'ft-prov'},

// ══════════════════════════════════════════════════════
//  FORMATAÇÃO / PARSE
// ══════════════════════════════════════════════════════
function parseMoney(v) {
  if (v === '' || v == null) return 0;
  const s = String(v).replace(/R\$\s*/g,'').trim();
  if (s.includes(',')) return parseFloat(s.replace(/\./g,'').replace(',','.')) || 0;
  return parseFloat(s.replace(/[^\d.-]/g,'')) || 0;
}
function fmtMoneyTot(v) {
  if (!v) return '—';
  return 'R$ ' + v.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtBRL(v) {
  const n = parseFloat(v) || 0;
  return n.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
}

// ══════════════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════════════
let toastTimer;
const ICONS = {success:'✅', info:'ℹ️', warn:'⚠️'};
function showToast(msg, type='info', ms=2800) {
  const el = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  el.querySelector('.toast-icon').textContent = ICONS[type] || '';
  el.className = `toast ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.add('hide'), ms);
}

// ══════════════════════════════════════════════════════
//  COLUNAS (helpers)
// ══════════════════════════════════════════════════════
function allCols() {
  return [
    ...FIXED_COLS,
    ...extraCols.map((c, i) => ({
      f: c.id, label: c.label, type: c.type,
      group: c.group, minW: 90,
      grpStart: i === 0 && !FIXED_COLS.find(fc => fc.group === c.group),
      isExtra: true, extraId: c.id,
    })),
  ];
}

// ══════════════════════════════════════════════════════
//  RENDER HEADERS + FOOTER
// ══════════════════════════════════════════════════════
function renderHeaders() {
  const hg = document.getElementById('header-group');
  const hr = document.getElementById('header-row');
  const fr = document.getElementById('footer-row');
  hg.innerHTML = ''; hr.innerHTML = ''; fr.innerHTML = '';

  const cols = allCols();

  // # cell (group row)
  const thGN = document.createElement('th');
  thGN.rowSpan = 2; thGN.className = 'hg-fixed';
  thGN.style.cssText = 'width:44px;min-width:44px;';
  thGN.textContent = '#';
  hg.appendChild(thGN);

  // Group spans
  let curGrp = null, curTh = null;
  cols.forEach(col => {
    if (col.group !== curGrp) {
      curGrp = col.group;
      curTh = document.createElement('th');
      curTh.className = GROUPS[col.group].hgClass;
      curTh.colSpan = 1;
      hg.appendChild(curTh);
    } else {
      curTh.colSpan++;
    }
    curTh.textContent = GROUPS[col.group].label;
  });

  // Column labels
  cols.forEach((col, ci) => {
    const th = document.createElement('th');
    th.className = GROUPS[col.group].hmClass + (col.isExtra ? ' extra-col-header' : '');
    th.style.minWidth = (col.minW || 80) + 'px';
    th.dataset.ci = ci;
    if (col.isExtra) {
      th.innerHTML = `<span contenteditable="true" style="outline:none">${col.label}</span>
        <button class="del-col-btn" title="Remover coluna" onclick="removeCol('${col.extraId}')">✕</button>`;
    } else {
      th.textContent = col.label;
    }
    hr.appendChild(th);
  });

  // Footer
  const ftNum = document.createElement('td');
  ftNum.className = 'ft-num'; ftNum.textContent = 'Σ';
  fr.appendChild(ftNum);

  // Label cell abrange as colunas fixas de identificação
  const ftLbl = document.createElement('td');
  ftLbl.className = 'ft-label'; ftLbl.colSpan = NUM_FIXED;
  ftLbl.style.textAlign = 'right'; ftLbl.textContent = 'TOTAIS';
  fr.appendChild(ftLbl);

  cols.forEach((col, ci) => {
    if (ci < NUM_FIXED) return;
    const td = document.createElement('td');
    td.className = 'ft-val ' + GROUPS[col.group].ftClass;
    td.id = 'tot_' + col.f;
    td.textContent = '—';
    fr.appendChild(td);
  });
}

// ══════════════════════════════════════════════════════
//  CONSTRUIR LINHA
// ══════════════════════════════════════════════════════
function buildRow(emp, ri) {
  const tr = document.createElement('tr');
  tr.dataset.row = ri;

  const tdN = document.createElement('td');
  tdN.className = 'td-num';
  tdN.innerHTML = `<span class="row-num">${ri+1}</span>
    <button class="del-row-btn" title="Remover" onclick="removeRow(${ri})">✕</button>`;
  tr.appendChild(tdN);

  allCols().forEach((col, ci) => {
    const td = document.createElement('td');
    td.dataset.g = col.group;
    if (col.grpStart) {
      const cls = col.group === 'prov' ? 'grp-start-prov' : col.group === 'desc' ? 'grp-start-desc' : 'grp-start-info';
      td.classList.add(cls);
    }

    const wrap = document.createElement('div');
    wrap.className = 'cell-wrap';

    const inp = document.createElement('input');
    inp.type = 'text';
    inp.className = 'cell-input' + (col.type !== 'text' && col.type !== 'hours' ? ' is-number' : '');
    inp.dataset.field = col.f; inp.dataset.row = ri; inp.dataset.col = ci;
    inp.dataset.type = col.type;

    const raw = emp[col.f];
    inp.value = (raw === '' || raw == null) ? '' : String(raw);
    inp.placeholder = col.type === 'money' ? '0,00' : '';

    inp.addEventListener('blur',    () => { scheduleAutoSave(); updateTotals(); });
    inp.addEventListener('input',   updateTotals);
    inp.addEventListener('keydown', onCellKeydown);
    inp.addEventListener('paste',   onCellPaste);
    inp.addEventListener('focus',   () => tr.classList.add('row-active'));
    inp.addEventListener('blur',    () => tr.classList.remove('row-active'));

    wrap.appendChild(inp);
    td.appendChild(wrap);
    tr.appendChild(td);
  });

  return tr;
}

function renderTable() {
  renderHeaders();
  const tb = document.getElementById('payroll-body');
  tb.innerHTML = '';
  EMPLOYEES.forEach((e, i) => tb.appendChild(buildRow(e, i)));
  document.getElementById('badgeCount').textContent =
    EMPLOYEES.length + ' colaborador' + (EMPLOYEES.length !== 1 ? 'es' : '');
  updateTotals();
}

// ══════════════════════════════════════════════════════
//  TOTAIS
// ══════════════════════════════════════════════════════
function updateTotals() {
  allCols().forEach(col => {
    const el = document.getElementById('tot_' + col.f);
    if (!el) return;
    if (col.type === 'text') { el.textContent = '—'; return; }
    const inputs = document.querySelectorAll(`#payroll-body [data-field="${col.f}"]`);
    let sum = 0;
    inputs.forEach(i => { sum += parseMoney(i.value); });
    el.textContent = fmtMoneyTot(sum);
  });
}

// ══════════════════════════════════════════════════════
//  NAVEGAÇÃO TECLADO
// ══════════════════════════════════════════════════════
function onCellKeydown(e) {
  const row = parseInt(e.target.dataset.row);
  const col = parseInt(e.target.dataset.col);
  const move = (dr, dc) => { e.preventDefault(); focusCell(row+dr, col+dc); };
  if (e.key === 'Tab')   return move(0, e.shiftKey ? -1 : 1);
  if (e.key === 'Enter') return move(e.shiftKey ? -1 : 1, 0);
  if (e.ctrlKey && e.key === 'ArrowDown')  return move(1, 0);
  if (e.ctrlKey && e.key === 'ArrowUp')    return move(-1, 0);
  if (e.ctrlKey && e.key === 'ArrowRight') return move(0, 1);
  if (e.ctrlKey && e.key === 'ArrowLeft')  return move(0, -1);
}
function focusCell(row, col) {
  const el = document.querySelector(`#payroll-body [data-row="${row}"][data-col="${col}"]`);
  if (el) { el.focus(); if (el.select) el.select(); }
}

// ══════════════════════════════════════════════════════
//  PASTE INTELIGENTE
// ══════════════════════════════════════════════════════
function onCellPaste(e) {
  const text = (e.clipboardData || window.clipboardData).getData('text');
  if (!text.includes('\t') && !text.includes('\n')) return;

  e.preventDefault();
  const startRow = parseInt(e.target.dataset.row);
  const startCol = parseInt(e.target.dataset.col);
  const cols = allCols();
  const tbRows = document.getElementById('payroll-body').querySelectorAll('tr');

  const matrix = text
    .replace(/\r\n/g,'\n').replace(/\r/g,'\n').replace(/\n$/,'')
    .split('\n').map(r => r.split('\t'));

  let filled = 0;
  matrix.forEach((rowData, ri) => {
    const tRow = startRow + ri;
    if (tRow >= EMPLOYEES.length) return;
    rowData.forEach((val, ci) => {
      const tCol = startCol + ci;
      if (tCol >= cols.length) return;
      const inp = tbRows[tRow]?.querySelector(`[data-col="${tCol}"]`);
      if (!inp) return;
      inp.value = val.trim();
      inp.dispatchEvent(new Event('input'));
      filled++;
    });
  });

  updateTotals();
  if (filled) showToast(`${filled} célula${filled>1?'s':''} colada${filled>1?'s':''} ✓`, 'success');
}

// ══════════════════════════════════════════════════════
//  ADD / REMOVE LINHAS
// ══════════════════════════════════════════════════════
function addEmployee() {
  const emp = {};
  FIXED_COLS.forEach(c => { emp[c.f] = ''; });
  extraCols.forEach(c => { emp[c.id] = ''; });
  EMPLOYEES.push(emp);
  renderTable();
  const tb = document.getElementById('payroll-body');
  const last = tb.lastElementChild;
  last?.querySelector('.cell-input')?.focus();
  last?.scrollIntoView({behavior:'smooth', block:'center'});
  scheduleAutoSave();
}

function removeRow(idx) {
  if (!confirm(`Remover "${EMPLOYEES[idx]?.colaborador || 'este colaborador'}"?`)) return;
  EMPLOYEES.splice(idx, 1);
  renderTable();
  scheduleAutoSave();
}

// ══════════════════════════════════════════════════════
//  MODAL RUBRICA EXTRA
// ══════════════════════════════════════════════════════
let _modalGroup = 'prov';
const MODAL_TITLES = {prov:'Novo Provento', desc:'Novo Desconto', info:'Novo Informativo'};
const MODAL_TIPOS  = {prov:'money', desc:'money', info:'text'};

function abrirModalRubrica(group) {
  _modalGroup = group;
  document.getElementById('modalTitulo').textContent = MODAL_TITLES[group] || 'Nova Rubrica';
  document.getElementById('modalNome').value = '';
  document.getElementById('modalTipo').value = MODAL_TIPOS[group] || 'money';
  document.getElementById('modalRubrica').classList.add('active');
  setTimeout(() => document.getElementById('modalNome').focus(), 80);
}
function fecharModal() { document.getElementById('modalRubrica').classList.remove('active'); }

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('modalNome').addEventListener('keydown', e => {
    if (e.key === 'Enter') confirmarRubrica();
    if (e.key === 'Escape') fecharModal();
  });
  document.getElementById('modalRubrica').addEventListener('click', e => {
    if (e.target === e.currentTarget) fecharModal();
  });
});

function confirmarRubrica() {
  const label = document.getElementById('modalNome').value.trim();
  if (!label) { document.getElementById('modalNome').focus(); return; }
  const tipo = document.getElementById('modalTipo').value;
  const id   = 'extra_' + Date.now();
  extraCols.push({id, label, type: tipo, group: _modalGroup});
  EMPLOYEES.forEach(e => { e[id] = ''; });
  fecharModal();
  renderTable();
  scheduleAutoSave();
  showToast(`"${label}" adicionado`, 'success');
}

function removeCol(id) {
  if (!confirm('Remover esta rubrica e todos os seus valores?')) return;
  extraCols = extraCols.filter(c => c.id !== id);
  EMPLOYEES.forEach(e => { delete e[id]; });
  renderTable();
  scheduleAutoSave();
}

// ══════════════════════════════════════════════════════
//  AUTO-SAVE
// ══════════════════════════════════════════════════════
function coletarDados() {
  const cols = allCols();
  return Array.from(document.getElementById('payroll-body').querySelectorAll('tr')).map(tr => {
    const emp = {};
    cols.forEach((col, ci) => {
      const el = tr.querySelector(`[data-col="${ci}"]`);
      if (el) emp[col.f] = el.value;
    });
    return emp;
  });
}

function scheduleAutoSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(salvarLocal, 3000);
}

async function salvarLocal() {
  const payload = {
    competencia: document.getElementById('competencia').value,
    tipoFolha:   document.getElementById('tipoFolha').value,
    employees:   coletarDados(),
    extraCols,
    savedAt: new Date().toISOString(),
  };

  const legSave = document.getElementById('legSave');
  const btn     = document.getElementById('btnSave');
  legSave.textContent = '⏳ Salvando…';

  let savedCloud = false;
  try {
    const { error } = await sbClient.from('quadrante_folha_rascunho').upsert({
      empresa_codigo: EMPRESA_CODIGO,
      competencia:    payload.competencia,
      tipo_folha:     payload.tipoFolha,
      dados:          payload,
      updated_at:     payload.savedAt,
    }, { onConflict: 'empresa_codigo,competencia,tipo_folha' });
    if (!error) savedCloud = true;
  } catch(_) {}

  try { localStorage.setItem(LS_KEY, JSON.stringify(payload)); } catch(_) {}

  btn.classList.add('saved');
  setTimeout(() => btn.classList.remove('saved'), 2000);
  const hora = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
  legSave.textContent = savedCloud ? `☁ Salvo às ${hora}` : `💾 Salvo localmente ${hora}`;
}

function _aplicarRascunho(d) {
  EMPLOYEES = d.employees || [];
  extraCols  = d.extraCols || [];
  document.getElementById('competencia').value = d.competencia || '';
  if (d.tipoFolha) document.getElementById('tipoFolha').value = d.tipoFolha;
  const quando = d.savedAt ? new Date(d.savedAt).toLocaleString('pt-BR') : '—';
  document.getElementById('legSave').textContent = `☁ Rascunho de ${quando}`;
}

async function carregarLocal() {
  let localData = null;
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) { const d = JSON.parse(raw); if (d.employees?.length) localData = d; }
  } catch(_) {}

  let cloudData = null;
  try {
    const { data } = await sbClient.from('quadrante_folha_rascunho')
      .select('dados, updated_at')
      .eq('empresa_codigo', EMPRESA_CODIGO)
      .order('updated_at', { ascending: false })
      .limit(1)
      .single();
    if (data?.dados?.employees?.length) cloudData = data.dados;
  } catch(_) {}

  const candidato = (() => {
    if (!localData && !cloudData) return null;
    if (!localData) return cloudData;
    if (!cloudData) return localData;
    const tL = new Date(localData.savedAt || 0).getTime();
    const tC = new Date(cloudData.savedAt || 0).getTime();
    return tC >= tL ? cloudData : localData;
  })();

  if (!candidato) return false;

  const quando = candidato.savedAt ? new Date(candidato.savedAt).toLocaleString('pt-BR') : '—';

  return new Promise(resolve => {
    const toast = document.createElement('div');
    toast.style.cssText = `position:fixed;bottom:80px;right:24px;z-index:9999;
      background:#2C3E50;color:#fff;border-radius:10px;padding:16px 20px;
      box-shadow:0 6px 24px rgba(0,0,0,.25);font-size:13px;max-width:340px;`;
    toast.innerHTML = `
      <div style="font-weight:700;margin-bottom:8px;">📄 Rascunho encontrado</div>
      <div style="font-size:12px;opacity:.8;margin-bottom:12px;">Salvo em ${quando}</div>
      <div style="display:flex;gap:8px;">
        <button id="_btnSim" style="flex:1;background:#27ae60;border:none;color:#fff;border-radius:7px;padding:8px;font-size:12px;font-weight:700;cursor:pointer;">✔ Continuar</button>
        <button id="_btnNao" style="flex:1;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:7px;padding:8px;font-size:12px;cursor:pointer;">Ignorar</button>
      </div>`;
    document.body.appendChild(toast);
    toast.querySelector('#_btnSim').onclick = () => { _aplicarRascunho(candidato); toast.remove(); resolve(true); };
    toast.querySelector('#_btnNao').onclick = () => { toast.remove(); resolve(false); };
  });
}

function exportCSV() {
  const comp = document.getElementById('competencia').value || 'sem-data';
  const tipo = document.getElementById('tipoFolha').value;
  const cols = allCols();
  const rows = [['#', ...cols.map(c => c.label)].join(';')];
  document.getElementById('payroll-body').querySelectorAll('tr').forEach((tr, ri) => {
    const cells = [ri+1, ...cols.map((col, ci) => {
      const el = tr.querySelector(`[data-col="${ci}"]`);
      return `"${el ? el.value : ''}"`;
    })];
    rows.push(cells.join(';'));
  });
  const blob = new Blob(['﻿' + rows.join('\n')], {type:'text/csv;charset=utf-8;'});
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(blob),
    download: `folha_trackfield_${tipo}_${comp.replace('/','_')}.csv`,
  });
  a.click(); URL.revokeObjectURL(a.href);
  showToast('CSV exportado com sucesso', 'success');
}

// ══════════════════════════════════════════════════════
//  RESUMO + ENVIO
// ══════════════════════════════════════════════════════
const TIPO_FOLHA_LABELS = {
  '11':'Folha Mensal','41':'Adiantamento Salarial','42':'Folha Complementar',
  '51':'Adiantamento de 13º Salário','52':'13º Salário (integral ou 2ª parcela)',
  '70':'PLR (Participação nos Lucros e Resultados)'
};

function coletarDadosEnvio() {
  return {
    competencia: document.getElementById('competencia').value,
    tipo_folha:  document.getElementById('tipoFolha').value,
    employees:   coletarDados(),
    extraCols,
    savedAt: new Date().toISOString(),
  };
}

function fmtCelula(val, type) {
  if (val === '' || val == null) return '–';
  if (type === 'money') {
    const n = parseMoney(val);
    return n ? fmtBRL(n) : '–';
  }
  return String(val);
}

function abrirResumoEnvio() {
  const dados = coletarDadosEnvio();
  if (!dados.competencia) { showToast('Informe a competência antes de enviar.', 'warn'); return; }
  if (!dados.employees.length) { showToast('Nenhum colaborador no formulário.', 'warn'); return; }

  const tipoLabel = TIPO_FOLHA_LABELS[dados.tipo_folha] || dados.tipo_folha;
  const cols = allCols();

  const colsAtivas = cols.filter(col =>
    dados.employees.some(emp => emp[col.f] !== '' && emp[col.f] != null)
  );

  let totalProv = 0, totalDesc = 0;
  dados.employees.forEach(emp => {
    colsAtivas.forEach(col => {
      if (col.type !== 'money') return;
      const v = parseMoney(emp[col.f] || '');
      if (col.group === 'prov') totalProv += v;
      if (col.group === 'desc') totalDesc += v;
    });
  });

  // Agrupar por loja para exibição
  const lojas = [...new Set(dados.employees.map(e => e.loja || '—'))];

  const thsHtml = ['#', 'Loja', 'Colaborador', ...colsAtivas.filter(c => c.group !== 'fixed').map(c => c.label)]
    .map(h => `<th>${h}</th>`).join('');

  const linhasHtml = dados.employees.map((emp, i) => {
    const colsNaoFixed = colsAtivas.filter(c => c.group !== 'fixed');
    const tds = colsNaoFixed.map(col =>
      `<td class="${col.type==='money'?'num':''}">${fmtCelula(emp[col.f], col.type)}</td>`
    ).join('');
    return `<tr><td>${i+1}</td><td style="white-space:nowrap">${emp.loja||'—'}</td><td style="white-space:nowrap">${emp.colaborador||'—'}</td>${tds}</tr>`;
  }).join('');

  document.getElementById('modalResumoEnvio').innerHTML = `
    <div class="modal-box modal-resumo">
      <div class="modal-resumo-head">
        <h3>📋 Resumo do Formulário — Track &amp; Field · Revisão antes do Envio</h3>
        <div class="modal-resumo-meta">
          <div class="resumo-meta-item">Empresa <strong>Track &amp; Field · ${EMPRESA_CODIGO}</strong></div>
          <div class="resumo-meta-item">Competência <strong>${dados.competencia}</strong></div>
          <div class="resumo-meta-item">Tipo <strong>${dados.tipo_folha} – ${tipoLabel}</strong></div>
          <div class="resumo-meta-item">Colaboradores <strong>${dados.employees.length}</strong></div>
          <div class="resumo-meta-item">Lojas <strong>${lojas.filter(l=>l&&l!=='—').join(', ')}</strong></div>
        </div>
      </div>
      <div class="modal-resumo-body">
        <div class="resumo-totais">
          <div class="resumo-total-card rtc-func">
            <div class="rtc-label">Colaboradores</div>
            <div class="rtc-val">${dados.employees.length}</div>
          </div>
          <div class="resumo-total-card rtc-prov">
            <div class="rtc-label">Total Proventos</div>
            <div class="rtc-val">${fmtBRL(totalProv)}</div>
          </div>
          <div class="resumo-total-card rtc-desc">
            <div class="rtc-label">Total Descontos</div>
            <div class="rtc-val">${fmtBRL(totalDesc)}</div>
          </div>
        </div>
        <div class="resumo-section" style="margin-top:20px;">
          <div class="resumo-section-title">Colaboradores e Valores</div>
          <div style="overflow-x:auto;">
            <table class="resumo-table">
              <thead><tr>${thsHtml}</tr></thead>
              <tbody>${linhasHtml}</tbody>
            </table>
          </div>
        </div>
      </div>
      <div class="modal-resumo-foot">
        <span style="font-size:11px;color:var(--text-sec);flex:1;">Revise os dados. Após confirmar, o formulário será enviado para a ferramenta de Fechamento.</span>
        <button class="btn-cancelar-resumo" onclick="fecharResumoEnvio()">Cancelar</button>
        <button class="btn-cancelar-resumo" onclick="salvarResumoHTML()" title="Salvar como PDF via impressão">🖨 Salvar Resumo</button>
        <button class="btn-confirmar" id="btnConfirmarEnvio" onclick="confirmarEnvio()">✔ Confirmar Envio</button>
      </div>
    </div>`;
  document.getElementById('modalResumoEnvio').classList.add('active');
  document.getElementById('modalResumoEnvio')._dados = dados;
}

function salvarResumoHTML() {
  const body = document.querySelector('#modalResumoEnvio .modal-resumo-body').innerHTML;
  const head = document.querySelector('#modalResumoEnvio .modal-resumo-head').innerHTML;
  const w = window.open('', '_blank', 'width=1200,height=800');
  w.document.write(`<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
    <title>Resumo Folha – Track &amp; Field</title>
    <style>
      body{font-family:-apple-system,sans-serif;font-size:12px;padding:24px;color:#2C3E50}
      h3{color:#1a6b3a;margin-bottom:8px} table{border-collapse:collapse;width:100%;margin-bottom:16px}
      th{background:#f5f5f5;padding:6px 10px;text-align:left;font-size:11px;border-bottom:2px solid #ddd}
      td{padding:5px 10px;border-bottom:1px solid #f0f0f0;font-size:11px}
      .num{text-align:right} .resumo-meta{display:flex;gap:20px;flex-wrap:wrap;margin:8px 0 16px;font-size:12px}
      .resumo-totais{display:flex;gap:12px;margin-bottom:20px}
      .rtc{background:#f8f8f8;border-radius:6px;padding:8px 14px;min-width:120px}
      .rtc-label{font-size:10px;font-weight:700;text-transform:uppercase;color:#7F8C8D}
      .rtc-val{font-size:15px;font-weight:700;margin-top:2px}
      .sec-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:#7F8C8D;border-bottom:1px solid #ddd;padding-bottom:4px;margin:16px 0 8px}
      @media print{body{padding:10px}}
    </style></head><body>
    <div>${head}</div><div>${body}</div>
    <script>window.onload=()=>window.print();<\/script>
  </body></html>`);
  w.document.close();
}

function fecharResumoEnvio() {
  document.getElementById('modalResumoEnvio').classList.remove('active');
}

async function confirmarEnvio() {
  const overlay = document.getElementById('modalResumoEnvio');
  const dados   = overlay._dados;
  const btn     = document.getElementById('btnConfirmarEnvio');
  btn.disabled  = true;
  btn.textContent = '⏳ Enviando…';

  try {
    const { error } = await sbClient.from('quadrante_folha_envios').insert({
      empresa_codigo: EMPRESA_CODIGO,
      competencia:    dados.competencia,
      tipo_folha:     dados.tipo_folha,
      dados:          dados,
    });
    if (error) throw error;

    await sbClient.from('quadrante_folha_rascunho').upsert({
      empresa_codigo: EMPRESA_CODIGO,
      competencia:    dados.competencia,
      tipo_folha:     dados.tipo_folha,
      dados:          dados,
      updated_at:     new Date().toISOString(),
    }, { onConflict: 'empresa_codigo,competencia,tipo_folha' });

    fecharResumoEnvio();
    showToast('Formulário enviado para o Fechamento com sucesso!', 'success');
  } catch(e) {
    btn.disabled = false;
    btn.textContent = '✔ Confirmar Envio';
    showToast('Erro ao enviar: ' + (e.message || e), 'warn');
  }
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('competencia').addEventListener('input', e => {
    let v = e.target.value.replace(/\D/g,'');
    if (v.length >= 2) v = v.slice(0,2) + '/' + v.slice(2,6);
    e.target.value = v;
  });
});

// ══════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', async () => {
  const auth = await window.PortalAuthGuard.init(1, { returnAfterLogin: true });
  if (!auth) return;

  const loaded = await carregarLocal();
  if (!loaded) {
    EMPLOYEES = JSON.parse(JSON.stringify(EMPLOYEES_DEFAULT));
  }

  if (!document.getElementById('competencia').value) {
    const hoje = new Date();
    const mm   = String(hoje.getMonth() + 1).padStart(2, '0');
    document.getElementById('competencia').value = `${mm}/${hoje.getFullYear()}`;
  }

  renderTable();
});
