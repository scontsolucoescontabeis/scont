<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Onboarding Contábil — Scont</title>
  <link rel="icon" type="image/x-icon" href="../assets/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="../assets/apple-touch-icon.png" />
  <link rel="stylesheet" href="styles.css" />
  <script src="../supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../portal-auth-guard.js"></script>
</head>
<body>
<!-- AUTH OVERLAY -->
<div id="authOverlay" style="position:fixed;inset:0;background:#F0F2F5;z-index:99999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;">
  <div style="font-size:40px;">🔐</div>
  <p style="font-family:sans-serif;color:#8B3A3A;font-weight:600;font-size:15px;">Verificando acesso...</p>
</div>

<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">🧾</div>
      <div>
        <h1>SCONT</h1>
        <p>Onboarding Contábil</p>
      </div>
    </div>

    <button class="btn-novo" id="btnNovoOnboarding">+ Novo Onboarding</button>

    <input type="text" class="busca-onboarding" id="buscaOnboarding" placeholder="Buscar empresa..." />

    <div class="nav-tree" id="listaOnboardings">
      <p class="nav-loading">Carregando...</p>
    </div>

    <div class="sidebar-footer">
      <button class="btn-voltar" onclick="window.location.href='../portal.html'">
        🏠 <span>Voltar ao Portal</span>
      </button>
    </div>
  </aside>

  <main class="main" id="main">
    <div class="empty-state">
      <div class="emoji">🧾</div>
      <h2>Onboarding Contábil</h2>
      <p>Selecione um onboarding na lista ao lado, ou clique em "Novo Onboarding" para iniciar o levantamento de uma empresa.</p>
    </div>
  </main>
</div>

<script src="data/catalogo.js"></script>
<script src="app.js"></script>
</body>
</html>
