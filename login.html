<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCONT - Login</title>
    <script src="supabase-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #8B3A3A; --primary-hover: #6B2A2A; --secondary: #2C3E50;
            --success: #27AE60; --danger: #E74C3C; --info: #3498DB;
            --card: #FFFFFF; --text: #2C3E50; --muted: #7F8C8D;
            --border: #E0E6ED; --bg: #F8F9FA;
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.12); --shadow-md: 0 4px 16px rgba(0,0,0,0.1);
            --radius: 10px; --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
        }
        .login-container { width:100%; max-width:450px; }
        .login-card { background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow-lg); overflow:hidden; }
        .login-header { background:white; padding:36px 32px; text-align:center; border-bottom:2px solid var(--border); }
        .login-header img { max-width:260px; height:auto; margin:0 auto; display:block; }
        .login-body { padding:36px 32px; }
        .form-group { margin-bottom:18px; }
        .form-group label { display:block; margin-bottom:7px; font-weight:600; font-size:12px; color:var(--text); text-transform:uppercase; letter-spacing:0.5px; }
        .form-group input {
            width:100%; padding:11px 13px; border:1px solid var(--border);
            border-radius:6px; font-size:14px; font-family:inherit; transition:var(--transition);
        }
        .form-group input:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(139,58,58,0.1); }
        .form-group input::placeholder { color:var(--muted); }
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
        .form-row .form-group { margin-bottom:0; }
        .tabs { display:flex; margin-bottom:28px; border-bottom:2px solid var(--border); }
        .tab-btn { flex:1; padding:13px; background:none; border:none; cursor:pointer; font-size:14px; font-weight:600; color:var(--muted); border-bottom:3px solid transparent; transition:var(--transition); }
        .tab-btn:hover { color:var(--primary); }
        .tab-btn.active { color:var(--primary); border-bottom-color:var(--primary); }
        .tab-content { display:none; }
        .tab-content.active { display:block; }
        .btn-primary {
            width:100%; padding:12px;
            background:linear-gradient(135deg, var(--primary), var(--primary-hover));
            color:white; border:none; border-radius:6px; cursor:pointer;
            font-weight:600; font-size:14px; transition:var(--transition); margin-top:8px;
        }
        .btn-primary:hover { transform:translateY(-2px); box-shadow:var(--shadow-md); }
        .btn-primary:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
        .alert { padding:11px 15px; border-radius:6px; margin-bottom:18px; font-size:13px; display:none; border-left:4px solid; font-weight:500; }
        .alert.show { display:block; animation:slideIn 0.3s ease; }
        .alert-success { background:rgba(39,174,96,.12); color:var(--success); border-left-color:var(--success); }
        .alert-error   { background:rgba(231,76,60,.12);  color:var(--danger);  border-left-color:var(--danger); }
        .alert-info    { background:rgba(52,152,219,.12); color:var(--info);    border-left-color:var(--info); }
        .loading { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%; animation:spin .8s linear infinite; margin-right:7px; vertical-align:middle; }
        @keyframes spin { to { transform:rotate(360deg); } }
        @keyframes slideIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
        .login-footer { padding:18px 32px; background:var(--bg); text-align:center; font-size:12px; color:var(--muted); }
        @media (max-width:480px) { .login-header,.login-body { padding:24px 18px; } .form-row { grid-template-columns:1fr; } }
    </style>
</head>
<body>
<div class="login-container">
  <div class="login-card">
    <div class="login-header">
        <img src="https://scontdf.com.br/wp-content/uploads/2019/11/logo-scont-1024x363.png" alt="SCONT">
    </div>
    <div class="login-body">
        <div class="tabs">
            <button class="tab-btn active" data-tab="login">🔐 Login</button>
            <button class="tab-btn" data-tab="cadastro">📝 Cadastro</button>
        </div>

        <div id="login" class="tab-content active">
            <div id="alertLogin" class="alert"></div>
            <form id="loginForm">
                <div class="form-group"><label>E-mail</label>
                    <input type="email" id="loginEmail" placeholder="seu@email.com" required autocomplete="email"></div>
                <div class="form-group"><label>Senha</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password"></div>
                <button type="submit" class="btn-primary" id="btnLogin">Entrar</button>
            </form>
        </div>

        <div id="cadastro" class="tab-content">
            <div id="alertCadastro" class="alert"></div>
            <form id="cadastroForm">
                <div class="form-group"><label>Nome Completo *</label>
                    <input type="text" id="cadastroNome" placeholder="Seu nome completo" required></div>
                <div class="form-group"><label>E-mail *</label>
                    <input type="email" id="cadastroEmail" placeholder="seu@email.com" required></div>
                <div class="form-group"><label>Senha *</label>
                    <input type="password" id="cadastroPassword" placeholder="Mínimo 6 caracteres" required minlength="6"></div>
                <div class="form-group"><label>Confirmar Senha *</label>
                    <input type="password" id="cadastroPasswordConfirm" placeholder="Confirme a senha" required minlength="6"></div>
                <div class="form-row">
                    <div class="form-group"><label>Empresa *</label>
                        <input type="text" id="cadastroEmpresa" placeholder="Sua empresa" required></div>
                    <div class="form-group"><label>Cargo *</label>
                        <input type="text" id="cadastroCargo" placeholder="Seu cargo" required></div>
                </div>
                <div class="form-group"><label>Telefone</label>
                    <input type="tel" id="cadastroTelefone" placeholder="(61) 99999-9999"></div>
                <button type="submit" class="btn-primary" id="btnCadastro">Solicitar Acesso</button>
                <p style="font-size:12px;color:var(--muted);margin-top:14px;text-align:center;">
                    ℹ️ Sua solicitação será analisada pelo administrador.
                </p>
            </form>
        </div>
    </div>
    <div class="login-footer">© 2026 SCONT. Todos os direitos reservados.</div>
  </div>
</div>

<script>
// ─── CONFIG (compartilhada com todos os arquivos) ───────────
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const _returnTo = new URLSearchParams(location.search).get('returnTo');

function _toolPath(url) {
    try {
        const path = decodeURIComponent(new URL(url).pathname).replace(/\\/g, '/');
        const segs = path.split('/').filter(Boolean);
        if (segs.length < 2) return (segs[0] || '').toLowerCase();
        return (segs[segs.length - 2] + '/' + segs[segs.length - 1]).toLowerCase();
    } catch { return ''; }
}

async function _resolveDestino(isAdmin, userId) {
    if (!_returnTo) return 'portal.html';
    if (isAdmin) return _returnTo;
    const toolPath = _toolPath(_returnTo);
    const toolFolder = toolPath.split('/')[0];
    const { data } = await sb.from('usuario_ferramentas').select('ferramentas ( url_base )');
    const autorizadas = (data || [])
        .map(r => r.ferramentas?.url_base).filter(Boolean)
        .map(u => decodeURIComponent(u).replace(/^\.\//, '').replace(/\\/g, '/').toLowerCase());
    return autorizadas.some(u => u === toolPath || u.startsWith(toolFolder + '/'))
        ? _returnTo
        : 'portal.html';
}

function sanitize(s) { const d = document.createElement('div'); d.textContent = String(s ?? ''); return d.innerHTML; }
function showAlert(el, msg, type) { el.textContent = msg; el.className = `alert alert-${type} show`; setTimeout(() => el.classList.remove('show'), 6000); }

// Abas
document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
}));

// ─── LOGIN ─────────────────────────────────────────────────
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const btn = document.getElementById('btnLogin');
    const alertEl = document.getElementById('alertLogin');

    btn.disabled = true;
    btn.innerHTML = '<span class="loading"></span>Entrando...';

    try {
        // 1. Autenticar no Supabase Auth
        const { data: authData, error: authErr } = await sb.auth.signInWithPassword({ email, password });
        if (authErr) throw new Error(authErr.message);

        // 2. Verificar se é admin — busca por EMAIL (evita problema de RLS com id)
        //    A tabela usuarios tem policy que permite ler o próprio registro,
        //    mas o email digitado no form é mais confiável que esperar o auth.uid() propagar.
        const { data: usuario, error: usuarioErr } = await sb
            .from('usuarios')
            .select('id, nome, is_admin')
            .eq('email', email)
            .maybeSingle();

        if (usuario?.is_admin) {
            const loginTime = new Date().toISOString();
            sessionStorage.setItem('adminAuth', JSON.stringify({
                authUserId: authData.user.id,
                email:      authData.user.email,
                nome:       usuario.nome,
                loginTime
            }));
            sessionStorage.setItem('userAuth', JSON.stringify({
                authUserId: authData.user.id,
                email:      authData.user.email,
                loginTime,
                isAdmin:    true,
                userData:   { nome: usuario.nome }
            }));
            showAlert(alertEl, '✅ Acesso admin liberado! Redirecionando...', 'success');
            const destinoAdmin = await _resolveDestino(true);
            setTimeout(() => { window.location.href = destinoAdmin; }, 1200);
            return;
        }

        // 3. Usuário comum — buscar solicitação pelo email
        const { data: sol, error: solErr } = await sb
            .from('solicitacoes_acesso')
            .select('id, nome, empresa, cargo, status')
            .eq('email', email)
            .maybeSingle();

        if (!sol) {
            await sb.auth.signOut();
            throw new Error('Cadastro não encontrado. Use o formulário de cadastro para solicitar acesso.');
        }

        if (sol.status === 'pendente') {
            await sb.auth.signOut();
            throw new Error('Sua solicitação ainda está pendente de aprovação.');
        }

        if (sol.status === 'rejeitado') {
            await sb.auth.signOut();
            throw new Error('Solicitação rejeitada. Entre em contato com o administrador.');
        }

        // 4. Sessão de usuário comum
        sessionStorage.setItem('userAuth', JSON.stringify({
            authUserId: authData.user.id,
            userId:     sol.id,
            email:      authData.user.email,
            loginTime:  new Date().toISOString(),
            userData:   { nome: sol.nome, empresa: sol.empresa, cargo: sol.cargo }
        }));

        showAlert(alertEl, '✅ Login realizado! Redirecionando...', 'success');
        const destino = await _resolveDestino(false);
        setTimeout(() => { window.location.href = destino; }, 1200);

    } catch (err) {
        showAlert(alertEl, '❌ ' + sanitize(err.message), 'error');
        btn.disabled = false;
        btn.innerHTML = 'Entrar';
    }
});

// ─── CADASTRO ──────────────────────────────────────────────
document.getElementById('cadastroForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const nome     = document.getElementById('cadastroNome').value.trim();
    const email    = document.getElementById('cadastroEmail').value.trim();
    const password = document.getElementById('cadastroPassword').value;
    const confirm  = document.getElementById('cadastroPasswordConfirm').value;
    const empresa  = document.getElementById('cadastroEmpresa').value.trim();
    const cargo    = document.getElementById('cadastroCargo').value.trim();
    const telefone = document.getElementById('cadastroTelefone').value.trim();
    const btn      = document.getElementById('btnCadastro');
    const alertEl  = document.getElementById('alertCadastro');

    if (password !== confirm) { showAlert(alertEl, '❌ As senhas não conferem', 'error'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="loading"></span>Processando...';

    try {
        // 1. Criar conta no Auth primeiro
        const { data: signUpData, error: authErr } = await sb.auth.signUp({
            email, password,
            options: { data: { nome, empresa, cargo } }
        });

        // "User already registered" = conta existe mas sem solicitação ainda, continuar
        const jaExisteNoAuth = authErr?.message?.includes('already registered');
        if (authErr && !jaExisteNoAuth) {
            throw new Error(authErr.message);
        }

        // 2. Inserir solicitação — a constraint UNIQUE(email) do banco
        //    rejeita duplicatas e nos diz exatamente o que aconteceu
        const { error: insErr } = await sb
            .from('solicitacoes_acesso')
            .insert([{ nome, email, empresa, cargo, telefone: telefone || null, status: 'pendente' }]);

        if (insErr) {
            // Código 23505 = violação de unique constraint = e-mail já cadastrado
            if (insErr.code === '23505') {
                throw new Error('Este e-mail já possui uma solicitação. Caso ainda não tenha acesso, aguarde a aprovação do administrador.');
            }
            throw new Error('Erro ao registrar solicitação: ' + insErr.message);
        }

        // 3. Sucesso
        showAlert(alertEl, '✅ Solicitação enviada! Aguarde a aprovação do administrador.', 'success');
        document.getElementById('cadastroForm').reset();
        setTimeout(() => {
            document.querySelector('[data-tab="login"]').click();
            showAlert(document.getElementById('alertLogin'), 'ℹ️ Solicitação enviada. Você será notificado quando aprovado.', 'info');
        }, 2200);

    } catch (err) {
        showAlert(alertEl, '❌ ' + sanitize(err.message), 'error');
        btn.disabled = false;
        btn.innerHTML = 'Solicitar Acesso';
    }
});

// ─── REDIRECT SE JÁ LOGADO ─────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
    const { data: { session } } = await sb.auth.getSession();
    const saved = sessionStorage.getItem('userAuth');
    if (session && saved) {
        const auth = JSON.parse(saved);
        window.location.href = await _resolveDestino(!!auth.isAdmin);
        return;
    }
    if (!session && saved) sessionStorage.removeItem('userAuth');
});
</script>
</body>
</html>
